<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
<title>Piglet Escape Game</title>
<style>
  :root{
    --bg:#143d63;
    --pink:#e79cab;
    --text:#eef6ff;
    --ui:rgba(4,15,26,.92);
  }
  html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:var(--bg);
    touch-action:manipulation;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  }
  #wrap{position:fixed;inset:0;background:var(--bg);}
  canvas{
    position:absolute;inset:0;width:100%;height:100%;display:block;
    touch-action:none;
  }
  #panelBtn{
    position:absolute;top:max(10px, env(safe-area-inset-top));right:10px;z-index:40;
    font-size:13px;color:white;background:rgba(4,15,26,.86);
    border:1px solid rgba(255,255,255,.14);border-radius:10px;padding:8px 11px;
    user-select:none;-webkit-user-select:none;touch-action:manipulation;cursor:pointer;
  }
  #panel{
    position:absolute;top:54px;right:10px;z-index:39;display:none;background:var(--ui);
    color:var(--text);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:12px 14px;
    width:265px;box-shadow:0 12px 30px rgba(0,0,0,.25);font-size:14px;
  }
  #panelHead{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  #panelTitle{font-weight:700;font-size:16px;}
  #closePanel{
    border:0;background:#173149;color:white;border-radius:8px;padding:5px 9px;font-size:12px;
  }
  .row{margin:10px 0;}
  .label{font-size:13px;opacity:.92;margin-bottom:4px;}
  .value{font-weight:700;}
  input[type="range"]{width:100%;}
  .hint{font-size:12px;opacity:.82;line-height:1.28;margin-top:8px;}
  #score{
    position:absolute;inset:0;display:none;align-items:center;justify-content:center;z-index:50;
    background:rgba(5,16,24,.48);color:white;text-align:center;
  }
  #scoreCard{
    background:rgba(6,18,29,.94);border:1px solid rgba(255,255,255,.12);
    border-radius:16px;padding:22px 24px;min-width:230px;box-shadow:0 20px 40px rgba(0,0,0,.35);
  }
  #scoreTime{font-size:34px;font-weight:700;margin:8px 0 12px;}
  #scoreSmall{font-size:14px;opacity:.82}
  #playBtn{margin-top:14px;padding:10px 14px;border-radius:10px;border:0;background:#2a83ff;color:white;font-size:15px;}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>
  <button id="panelBtn" type="button">Control Panel</button>

  <div id="panel" data-hidden="1">
    <div id="panelHead">
      <div id="panelTitle">Control Panel</div>
      <button id="closePanel" type="button">Close</button>
    </div>

    <div class="row">
      <div class="label">Max speed: <span id="speedVal" class="value">55</span></div>
      <input id="speedSlider" type="range" min="20" max="120" step="5" value="55">
    </div>

    <div class="row">
      <div class="label">Circle size: <span id="sizeVal" class="value">1.00</span></div>
      <input id="sizeSlider" type="range" min="0.70" max="1.60" step="0.05" value="1.00">
    </div>

    <div class="row">
      <div class="label">Count: <span id="countVal" class="value">10</span></div>
      <input id="countSlider" type="range" min="6" max="14" step="1" value="10">
    </div>

    <div class="hint">
      Tap the <strong>Control Panel</strong> button, or double-tap empty background.<br>
      Inner half of a circle pops it. Outer half triggers the piglet escape.
    </div>
  </div>

  <div id="score">
    <div id="scoreCard">
      <div id="scoreSmall">Elapsed time</div>
      <div id="scoreTime">0.00 s</div>
      <div id="scoreSmall">from first capture to final finish</div>
      <button id="playBtn" type="button">Play Again</button>
    </div>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const panel = document.getElementById('panel');
  const panelBtn = document.getElementById('panelBtn');
  const closePanel = document.getElementById('closePanel');
  const speedSlider = document.getElementById('speedSlider');
  const speedVal = document.getElementById('speedVal');
  const sizeSlider = document.getElementById('sizeSlider');
  const sizeVal = document.getElementById('sizeVal');
  const countSlider = document.getElementById('countSlider');
  const countVal = document.getElementById('countVal');
  const score = document.getElementById('score');
  const scoreTime = document.getElementById('scoreTime');
  const playBtn = document.getElementById('playBtn');

  const escapeSprite = new Image();
  escapeSprite.src = "escape.png";
  const lookSprite = new Image();
  lookSprite.src = "look_back.png";
  const sounds = [
    new Audio("pig_oink.mp3"),
    new Audio("pig_oink1.mp3")
  ];

  const FRAME_W = 512, FRAME_H = 512;
  const BG = '#143d63', PINK = '#e79cab';
  const BASE_R = 34;

  let dpr = 1;
  let W = 0, H = 0;
  let pigs = [];
  let gameEnded = false;
  let firstCaptureAt = null;
  let finalScoreMs = 0;
  let maxSpeed = 55;
  let sizeMul = 1.0;
  let pigCount = 10;
  let lastBgTapTime = 0, lastBgX = 0, lastBgY = 0;

  function resize(){
    dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = Math.floor(W * dpr);
    canvas.height = Math.floor(H * dpr);
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  resize();
  addEventListener('resize', resize, {passive:true});

  function rand(a,b){ return a + Math.random()*(b-a); }
  function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }
  function dist(ax,ay,bx,by){ return Math.hypot(ax-bx, ay-by); }

  function showPanel(show){
    panel.style.display = show ? 'block' : 'none';
    panel.dataset.hidden = show ? '0' : '1';
  }
  function togglePanel(){
    showPanel(panel.dataset.hidden === '1');
  }

  ['pointerdown','pointerup','click','dblclick','touchstart','mousedown'].forEach(ev => {
    panel.addEventListener(ev, e => e.stopPropagation(), {passive:false});
    panelBtn.addEventListener(ev, e => e.stopPropagation(), {passive:false});
    score.addEventListener(ev, e => e.stopPropagation(), {passive:false});
  });

  panelBtn.onclick = function(ev){ ev.preventDefault(); ev.stopPropagation(); togglePanel(); };
  closePanel.onclick = function(ev){ ev.preventDefault(); ev.stopPropagation(); showPanel(false); };

  function updateLabels(){
    speedVal.textContent = String(maxSpeed);
    sizeVal.textContent = sizeMul.toFixed(2);
    countVal.textContent = String(pigCount);
  }
  updateLabels();

  speedSlider.oninput = function(){
    maxSpeed = Number(speedSlider.value);
    updateLabels();
    for (const p of pigs){
      if (p.state === 'circle'){
        const a = Math.atan2(p.vy, p.vx) || rand(0, Math.PI*2);
        const s = Math.min(Math.hypot(p.vx,p.vy), maxSpeed);
        p.vx = Math.cos(a) * s;
        p.vy = Math.sin(a) * s;
      }
    }
  };

  sizeSlider.oninput = function(){
    sizeMul = Number(sizeSlider.value);
    updateLabels();
    keepPigsInside();
  };

  countSlider.oninput = function(){
    pigCount = Number(countSlider.value);
    updateLabels();
    resetGame();
  };

  function playOink(){
    const base = sounds[(Math.random()*sounds.length)|0];
    const a = base.cloneNode();
    a.volume = 0.85;
    a.play().catch(()=>{});
  }

  function pigRadius(){
    return BASE_R * sizeMul;
  }

  function keepPigsInside(){
    const r = pigRadius();
    for (const p of pigs){
      p.r = r;
      p.x = clamp(p.x, r, W-r);
      p.y = clamp(p.y, r, H-r);
      if (p.targetX != null) p.targetX = clamp(p.targetX, r+16, W-r-16);
      if (p.targetY != null) p.targetY = clamp(p.targetY, r+16, H-r-16);
    }
  }

  function makePig(){
    const r = pigRadius();
    const margin = Math.max(r + 10, 28);
    const x = rand(margin, W-margin);
    const y = rand(margin + 10, H-margin);
    const a = rand(0, Math.PI*2);
    const s = rand(Math.max(18, maxSpeed*0.55), maxSpeed);
    return {
      x, y, r,
      vx:Math.cos(a)*s,
      vy:Math.sin(a)*s,
      state:'circle',
      t:0,
      frame:0,
      frameTime:0,
      dust:[],
      startX:x,
      startY:y,
      targetX:x,
      targetY:y,
      isFinal:false,
      wobbleSeed:rand(0,1000)
    };
  }

  function separateInitialOverlaps(){
    const pad = 2;
    for (let pass=0; pass<120; pass++){
      let moved = false;
      for (let i=0; i<pigs.length; i++){
        for (let j=i+1; j<pigs.length; j++){
          const a = pigs[i], b = pigs[j];
          const dx = b.x-a.x, dy = b.y-a.y;
          let d = Math.hypot(dx,dy);
          const min = a.r + b.r + pad;
          if (d < min){
            const nx = d > 0.0001 ? dx/d : Math.cos(pass+i+j);
            const ny = d > 0.0001 ? dy/d : Math.sin(pass+i+j);
            const push = (min - Math.max(d, 0.001)) / 2;
            a.x -= nx * push; a.y -= ny * push;
            b.x += nx * push; b.y += ny * push;
            a.x = clamp(a.x, a.r, W-a.r); a.y = clamp(a.y, a.r, H-a.r);
            b.x = clamp(b.x, b.r, W-b.r); b.y = clamp(b.y, b.r, H-b.r);
            moved = true;
          }
        }
      }
      if (!moved) break;
    }
  }

  function resetGame(){
    pigs = Array.from({length:pigCount}, makePig);
    separateInitialOverlaps();
    gameEnded = false;
    firstCaptureAt = null;
    finalScoreMs = 0;
    score.style.display = 'none';
    showPanel(false);
  }
  resetGame();
  playBtn.onclick = resetGame;

  function countCircles(){
    return pigs.filter(p => p.state === 'circle').length;
  }

  function showScore(){
    gameEnded = true;
    scoreTime.textContent = (finalScoreMs/1000).toFixed(2) + ' s';
    score.style.display = 'flex';
  }

  function bounceWalls(p){
    if (p.x < p.r){ p.x = p.r; p.vx = Math.abs(p.vx); }
    if (p.x > W-p.r){ p.x = W-p.r; p.vx = -Math.abs(p.vx); }
    if (p.y < p.r){ p.y = p.r; p.vy = Math.abs(p.vy); }
    if (p.y > H-p.r){ p.y = H-p.r; p.vy = -Math.abs(p.vy); }
  }

  function moveCircle(p, dt){
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    bounceWalls(p);
  }

  function collide(a,b){
    if(a.state !== 'circle' || b.state !== 'circle') return;
    const dx = b.x-a.x, dy = b.y-a.y;
    const d = Math.hypot(dx,dy);
    const min = a.r + b.r;
    if(d < min && d > 0.0001){
      const nx = dx/d, ny = dy/d;
      const overlap = min - d;
      a.x -= nx * overlap/2; a.y -= ny * overlap/2;
      b.x += nx * overlap/2; b.y += ny * overlap/2;

      const dvx = b.vx - a.vx, dvy = b.vy - a.vy;
      const vn = dvx*nx + dvy*ny;
      if(vn < 0){
        const impulse = -vn;
        a.vx -= impulse * nx;
        a.vy -= impulse * ny;
        b.vx += impulse * nx;
        b.vy += impulse * ny;
      }
      bounceWalls(a);
      bounceWalls(b);
    }
  }

  function poof(p){
    for(let i=0;i<13;i++){
      const a = rand(0, Math.PI*2), s = rand(18,55), life = rand(0.26,0.42);
      p.dust.push({x:p.x,y:p.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life,maxLife:life});
    }
  }

  function startEscape(p, tapX, tapY, isFinal){
    p.state = 'react';
    p.t = isFinal ? 0.42 : 0.34;
    p.frame = 0;
    p.frameTime = 0;
    p.dust = [];
    p.startX = p.x;
    p.startY = p.y;
    p.isFinal = isFinal;
    if (firstCaptureAt == null) firstCaptureAt = performance.now();

    let dx = p.x - tapX, dy = p.y - tapY;
    let len = Math.hypot(dx, dy);
    if (!len){
      const a = rand(0, Math.PI*2);
      dx = Math.cos(a);
      dy = Math.sin(a);
      len = 1;
    }
    dx /= len;
    dy /= len;

    const safeDist = Math.min(180, Math.max(110, 0.18 * Math.min(W,H)));
    p.targetX = clamp(p.x + dx*safeDist, p.r+16, W-p.r-16);
    p.targetY = clamp(p.y + dy*safeDist, p.r+16, H-p.r-16);
    playOink();
  }

  function topCircleAt(x,y){
    for(let i=pigs.length-1;i>=0;i--){
      const p = pigs[i];
      if (p.state !== 'circle') continue;
      if (dist(x,y,p.x,p.y) <= p.r) return p;
    }
    return null;
  }

  function updateDust(p, dt){
    for(const d of p.dust){
      d.life -= dt;
      d.x += d.vx * dt;
      d.y += d.vy * dt;
    }
    p.dust = p.dust.filter(d => d.life > 0);
  }

  function tick(p, dt){
    if (p.state === 'gone') return;
    if (p.state === 'circle'){
      moveCircle(p, dt);
      return;
    }

    if (p.state === 'pop'){
      p.t -= dt;
      if (p.t <= 0) p.state = 'gone';
      return;
    }

    if (p.state === 'react'){
      p.t -= dt;
      p.frameTime += dt;
      if (p.frameTime > 0.09){ p.frameTime = 0; p.frame = (p.frame + 1) % 3; }
      if (p.t <= 0){
        poof(p);
        p.state = 'dust';
        p.t = 0;
      }
      updateDust(p, dt);
      return;
    }

    if (p.state === 'dust'){
      p.t += dt / (p.isFinal ? 0.68 : 0.54);
      const t = Math.min(1, p.t);
      const tx = p.startX + (p.targetX - p.startX) * t;
      const ty = p.startY + (p.targetY - p.startY) * t;
      p.dust.push({x:tx,y:ty,vx:0,vy:0,life:0.34,maxLife:0.34});

      if (t >= 1){
        p.x = p.targetX;
        p.y = p.targetY;
        p.state = 'look';
        p.t = p.isFinal ? 1.0 : 0.55;
        p.frame = 0;
        p.frameTime = 0;
      }
      updateDust(p, dt);
      return;
    }

    if (p.state === 'look'){
      p.t -= dt;
      p.frameTime += dt;
      if (p.frameTime > 0.12){ p.frameTime = 0; p.frame = (p.frame + 1) % 2; }
      if (p.t <= 0){
        if (p.isFinal){
          p.state = 'gone';
          finalScoreMs = performance.now() - firstCaptureAt;
          setTimeout(showScore, 100);
        } else {
          p.state = 'circle';
          const a = rand(0, Math.PI*2), s = rand(Math.max(18, maxSpeed*0.55), maxSpeed);
          p.vx = Math.cos(a)*s;
          p.vy = Math.sin(a)*s;
        }
      }
      updateDust(p, dt);
    }
  }

  function drawDust(p){
    for(const d of p.dust){
      const a = Math.max(0, d.life / d.maxLife);
      ctx.globalAlpha = a * 0.82;
      ctx.beginPath();
      ctx.arc(d.x, d.y, 6 + (1-a)*7, 0, Math.PI*2);
      ctx.fillStyle = '#d7ceb0';
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function drawCircle(p){
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fillStyle = PINK;
    ctx.fill();
  }

  function drawSprite(img, frameIndex, x, y, size, wobble=0){
    if (!img.complete || !img.naturalWidth) return;
    ctx.save();
    ctx.translate(x, y);
    if (wobble) ctx.rotate(wobble);
    ctx.drawImage(img, frameIndex*FRAME_W,0,FRAME_W,FRAME_H,-size/2,-size/2,size,size);
    ctx.restore();
  }

  function canvasPoint(e){
    const rect = canvas.getBoundingClientRect();
    const cx = (typeof e.clientX==='number') ? e.clientX : 0;
    const cy = (typeof e.clientY==='number') ? e.clientY : 0;
    return {x:cx-rect.left, y:cy-rect.top};
  }

  function onTap(e){
    e.preventDefault();
    if (gameEnded) return;
    const {x,y} = canvasPoint(e);
    const hit = topCircleAt(x,y);

    if (!hit){
      const now = performance.now();
      const close = Math.hypot(x-lastBgX, y-lastBgY) < 36;
      if(now - lastBgTapTime < 320 && close){
        togglePanel();
        lastBgTapTime = 0;
      } else {
        lastBgTapTime = now;
        lastBgX = x;
        lastBgY = y;
      }
      return;
    }

    const circlesBefore = countCircles();

    if (circlesBefore === 1){
      startEscape(hit, x, y, true);
      return;
    }

    const d = dist(x,y,hit.x,hit.y);
    if (d < hit.r * 0.5){
      if (firstCaptureAt == null) firstCaptureAt = performance.now();
      hit.state = 'pop';
      hit.t = 0.20;
      return;
    }

    startEscape(hit, x, y, false);
  }

  canvas.addEventListener('pointerup', onTap, {passive:false});

  let prev = performance.now();
  function loop(now){
    const dt = Math.min(0.033, (now - prev) / 1000);
    prev = now;

    ctx.clearRect(0,0,W,H);
    ctx.fillStyle = BG;
    ctx.fillRect(0,0,W,H);

    for(const p of pigs) tick(p, dt);
    for(let i=0;i<pigs.length;i++){
      for(let j=i+1;j<pigs.length;j++){
        collide(pigs[i], pigs[j]);
      }
    }

    for(const p of pigs){
      if (p.state === 'gone') continue;
      drawDust(p);
      if (p.state === 'circle'){
        drawCircle(p);
      } else if (p.state === 'pop'){
        const k = Math.max(0, p.t / 0.20);
        ctx.globalAlpha = k;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * (1 + (1-k)*0.6), 0, Math.PI*2);
        ctx.fillStyle = PINK;
        ctx.fill();
        ctx.globalAlpha = 1;
      } else if (p.state === 'react'){
        const wobble = Math.sin((0.34 - Math.max(0,p.t))*36 + p.wobbleSeed) * 0.12;
        drawSprite(escapeSprite, p.frame, p.x, p.y, 84, wobble);
      } else if (p.state === 'look'){
        drawSprite(lookSprite, p.frame, p.x, p.y, 84, 0);
      }
    }
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
