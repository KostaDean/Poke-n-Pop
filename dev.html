<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Circle Box Screensaver</title>
<style>
  html, body { margin:0; padding:0; width:100%; height:100%; background:#0b0f14; overflow:hidden; }
  canvas { display:block; width:100vw; height:100vh; touch-action: none; }
  .ui {
    position: fixed; left: 12px; top: 12px; z-index: 10;
    font: 14px/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: rgba(255,255,255,0.85);
    background: rgba(0,0,0,0.35);
    padding: 10px 12px; border-radius: 10px;
    backdrop-filter: blur(6px);
    user-select:none;
  }
  .ui button, .ui input {
    font: inherit; color: inherit;
  }
  .ui button{
    border: 1px solid rgba(255,255,255,0.22);
    background: rgba(255,255,255,0.10);
    border-radius: 9px;
    padding: 6px 10px;
    cursor: pointer;
  }
  .ui button:active{ transform: translateY(1px); }
  .row { display:flex; align-items:center; gap:10px; margin-top:8px; }
  .row label { opacity:0.9; }
  .row input[type="range"]{ width: 160px; }
  .hint { opacity:0.75; font-size:12px; margin-top:8px; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div class="ui" id="ui">
  <div><b>Circle Box Screensaver</b></div>
  <div class="row">
    <button id="resetBtn">Reset</button>
    <button id="toggleBtn">Pause</button>
  </div>
  <div class="row">
    <label>Circles</label>
    <input id="count" type="range" min="5" max="120" step="1" value="35" />
    <span id="countVal">35</span>
  </div>
  <div class="row">
    <label>Speed</label>
    <input id="speed" type="range" min="0.3" max="3.0" step="0.1" value="1.3" />
    <span id="speedVal">1.3</span>
  </div>
  <div class="row">
    <label>Radius</label>
    <input id="radius" type="range" min="6" max="45" step="1" value="18" />
    <span id="radiusVal">18</span>
  </div>
  <div class="hint">
    Tap/click: toggle UI • Double-tap: reset • Drag slider to change live
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d', { alpha: false });

  const ui = document.getElementById('ui');
  const resetBtn = document.getElementById('resetBtn');
  const toggleBtn = document.getElementById('toggleBtn');
  const countEl = document.getElementById('count');
  const speedEl = document.getElementById('speed');
  const radiusEl = document.getElementById('radius');
  const countVal = document.getElementById('countVal');
  const speedVal = document.getElementById('speedVal');
  const radiusVal = document.getElementById('radiusVal');

  const state = {
    running: true,
    circles: [],
    lastT: performance.now(),
    dpr: Math.max(1, Math.min(3, window.devicePixelRatio || 1)),
    bg: '#0b0f14',
  };

  function resize() {
    state.dpr = Math.max(1, Math.min(3, window.devicePixelRatio || 1));
    const w = Math.floor(innerWidth * state.dpr);
    const h = Math.floor(innerHeight * state.dpr);
    canvas.width = w;
    canvas.height = h;
  }
  window.addEventListener('resize', resize, { passive: true });

  function rand(min, max) { return min + Math.random() * (max - min); }
  function clamp(x, a, b){ return Math.max(a, Math.min(b, x)); }

  function randColor() {
    // bright-ish colors, not too pale
    const h = Math.floor(Math.random()*360);
    const s = 80 + Math.random()*15;
    const l = 55 + Math.random()*10;
    return `hsl(${h} ${s}% ${l}%)`;
  }

  function makeCircle(i, R, baseSpeed) {
    const w = canvas.width, h = canvas.height;
    const x = rand(R, w - R);
    const y = rand(R, h - R);
    const a = rand(0, Math.PI*2);
    const sp = baseSpeed * rand(0.7, 1.3);
    const vx = Math.cos(a) * sp;
    const vy = Math.sin(a) * sp;
    // mass proportional to area (R^2) so big circles push more
    const m = R*R;
    return { x, y, vx, vy, r: R, m, color: randColor(), flash: 0 };
  }

  function init() {
    resize();
    const n = parseInt(countEl.value, 10);
    const R = parseFloat(radiusEl.value) * state.dpr;
    const sp = parseFloat(speedEl.value) * state.dpr * 140; // px/sec baseline
    state.circles = [];
    // place circles with gentle rejection sampling to reduce initial overlaps
    const maxAttempts = 9000;
    let attempts = 0;
    while (state.circles.length < n && attempts < maxAttempts) {
      const c = makeCircle(state.circles.length, R, sp);
      let ok = true;
      for (const o of state.circles) {
        const dx = c.x - o.x, dy = c.y - o.y;
        const rr = c.r + o.r;
        if (dx*dx + dy*dy < rr*rr * 1.05) { ok = false; break; }
      }
      if (ok) state.circles.push(c);
      attempts++;
    }
    // If we couldn't pack them all, still run with what we have
    countVal.textContent = state.circles.length;
  }

  // Elastic collision resolution for circles
  function resolveCollision(a, b) {
    const dx = b.x - a.x;
    const dy = b.y - a.y;
    const dist2 = dx*dx + dy*dy;
    const minDist = a.r + b.r;
    if (dist2 === 0) return;

    if (dist2 < minDist*minDist) {
      const dist = Math.sqrt(dist2);
      const nx = dx / dist;
      const ny = dy / dist;

      // Separate overlap (positional correction)
      const overlap = (minDist - dist);
      const totalMass = a.m + b.m;
      const corrA = overlap * (b.m / totalMass);
      const corrB = overlap * (a.m / totalMass);
      a.x -= nx * corrA;
      a.y -= ny * corrA;
      b.x += nx * corrB;
      b.y += ny * corrB;

      // Relative velocity along normal
      const rvx = b.vx - a.vx;
      const rvy = b.vy - a.vy;
      const velAlongNormal = rvx*nx + rvy*ny;

      // If moving apart after correction, skip impulse
      if (velAlongNormal > 0) return;

      const restitution = 1.0; // 1.0 = perfectly elastic bounce
      const j = -(1 + restitution) * velAlongNormal / (1/a.m + 1/b.m);

      const impX = j * nx;
      const impY = j * ny;

      a.vx -= impX / a.m;
      a.vy -= impY / a.m;
      b.vx += impX / b.m;
      b.vy += impY / b.m;

      // Flash effect
      a.flash = 1.0;
      b.flash = 1.0;
    }
  }

  function step(dt) {
    const w = canvas.width, h = canvas.height;

    for (const c of state.circles) {
      c.x += c.vx * dt;
      c.y += c.vy * dt;

      // wall bounce
      if (c.x - c.r < 0) { c.x = c.r; c.vx = Math.abs(c.vx); c.flash = 1.0; }
      if (c.x + c.r > w) { c.x = w - c.r; c.vx = -Math.abs(c.vx); c.flash = 1.0; }
      if (c.y - c.r < 0) { c.y = c.r; c.vy = Math.abs(c.vy); c.flash = 1.0; }
      if (c.y + c.r > h) { c.y = h - c.r; c.vy = -Math.abs(c.vy); c.flash = 1.0; }

      // keep from going too slow due to numeric issues
      const v2 = c.vx*c.vx + c.vy*c.vy;
      if (v2 < 1e-6) {
        const a = rand(0, Math.PI*2);
        const sp = parseFloat(speedEl.value) * state.dpr * 140;
        c.vx = Math.cos(a) * sp;
        c.vy = Math.sin(a) * sp;
      }

      // fade flash
      c.flash = Math.max(0, c.flash - dt * 2.4);
    }

    // collisions (O(n^2) — fine up to ~120)
    const arr = state.circles;
    for (let i = 0; i < arr.length; i++) {
      for (let j = i + 1; j < arr.length; j++) {
        resolveCollision(arr[i], arr[j]);
      }
    }
  }

  function draw() {
    // background
    ctx.fillStyle = state.bg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // circles
    for (const c of state.circles) {
      ctx.beginPath();
      ctx.arc(c.x, c.y, c.r, 0, Math.PI*2);

      ctx.fillStyle = c.color;
      ctx.fill();

      // subtle highlight ring
      if (c.flash > 0) {
        ctx.lineWidth = Math.max(2, 5 * state.dpr * c.flash);
        ctx.strokeStyle = `rgba(255,255,255,${0.55 * c.flash})`;
        ctx.stroke();
      } else {
        ctx.lineWidth = Math.max(1, 1.5 * state.dpr);
        ctx.strokeStyle = 'rgba(255,255,255,0.12)';
        ctx.stroke();
      }
    }

    // border box
    ctx.lineWidth = Math.max(2, 2.5 * state.dpr);
    ctx.strokeStyle = 'rgba(255,255,255,0.25)';
    ctx.strokeRect(0, 0, canvas.width, canvas.height);
  }

  function loop(t) {
    const dt = Math.min(0.03, Math.max(0.0, (t - state.lastT) / 1000));
    state.lastT = t;

    if (state.running) step(dt);
    draw();

    requestAnimationFrame(loop);
  }

  // UI wiring
  function updateLabels() {
    countVal.textContent = countEl.value;
    speedVal.textContent = speedEl.value;
    radiusVal.textContent = radiusEl.value;
  }
  updateLabels();

  countEl.addEventListener('input', () => { updateLabels(); init(); }, { passive: true });
  radiusEl.addEventListener('input', () => { updateLabels(); init(); }, { passive: true });
  speedEl.addEventListener('input', () => {
    updateLabels();
    // rescale velocities to new speed baseline
    const target = parseFloat(speedEl.value) * state.dpr * 140;
    for (const c of state.circles) {
      const v = Math.hypot(c.vx, c.vy) || 1;
      const scale = target / v;
      c.vx *= scale;
      c.vy *= scale;
    }
  }, { passive: true });

  resetBtn.addEventListener('click', init);
  toggleBtn.addEventListener('click', () => {
    state.running = !state.running;
    toggleBtn.textContent = state.running ? 'Pause' : 'Play';
  });

  // Tap anywhere to toggle UI visibility (except when interacting with UI)
  let lastTap = 0;
  function onPointerDown(e){
    // ignore if tap is on UI
    if (e.target.closest && e.target.closest('#ui')) return;

    const now = Date.now();
    const isDouble = (now - lastTap) < 350;
    lastTap = now;

    if (isDouble) {
      init();
    } else {
      ui.style.display = (ui.style.display === 'none') ? 'block' : 'none';
    }
  }
  window.addEventListener('pointerdown', onPointerDown, { passive: true });

  // Kick off
  init();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
