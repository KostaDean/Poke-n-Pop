<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Collision Music</title>
<style>
html,body{margin:0;height:100%;background:#0b0f14;overflow:hidden;font-family:-apple-system;}
canvas{display:block}
#panel{
 position:fixed;top:12px;left:12px;background:rgba(0,0,0,.5);
 color:#fff;padding:12px;border-radius:12px;backdrop-filter:blur(6px)
}
button{padding:8px 12px;border-radius:10px;border:1px solid #888;background:#222;color:#fff}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="panel">
<button id="startAudio">Start Sound</button>
<button id="reset">Reset</button>
<div style="font-size:12px;margin-top:6px">Tap "Start Sound" first (iPhone requirement)</div>
</div>

<script>
const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");
let W,H,dpr;
function resize(){
 dpr=window.devicePixelRatio||1;
 W=canvas.width=innerWidth*dpr;
 H=canvas.height=innerHeight*dpr;
}
window.addEventListener("resize",resize);resize();

let ac=null, master=null;
function initAudio(){
 if(ac) return;
 ac=new (window.AudioContext||window.webkitAudioContext)();
 master=ac.createGain();
 master.gain.value=0.6;
 master.connect(ac.destination);

 const o=ac.createOscillator();
 const g=ac.createGain();
 o.type="sine";
 o.frequency.value=440;
 g.gain.value=0.2;
 o.connect(g); g.connect(master);
 o.start(); o.stop(ac.currentTime+0.15);
}
document.getElementById("startAudio").onclick=()=>{
 initAudio();
 if(ac.state==="suspended") ac.resume();
};

function rand(a,b){return a+Math.random()*(b-a)}
function makeCircle(){
 let r=20*dpr;
 return{
  x:rand(r,W-r),
  y:rand(r,H-r),
  vx:rand(-200,200),
  vy:rand(-200,200),
  r:r,
  n:Math.floor(rand(10,300)),
  flash:0
 };
}

let circles=[];
function init(){
 circles=[];
 for(let i=0;i<30;i++) circles.push(makeCircle());
}
document.getElementById("reset").onclick=init;
init();

function playSound(a,b,impact){
 if(!ac) return;
 const now=ac.currentTime;
 const f=110+((a.n+b.n)%600);
 const o=ac.createOscillator();
 const g=ac.createGain();
 o.type="triangle";
 o.frequency.value=f;
 g.gain.setValueAtTime(0.001,now);
 g.gain.exponentialRampToValueAtTime(0.3*impact,now+0.01);
 g.gain.exponentialRampToValueAtTime(0.001,now+0.25);
 o.connect(g); g.connect(master);
 o.start(now);
 o.stop(now+0.26);
}

let lastT=performance.now();
function loop(t){
 const dt=Math.min(.03,(t-lastT)/1000);
 lastT=t;

 ctx.fillStyle="#0b0f14";
 ctx.fillRect(0,0,W,H);

 for(let c of circles){
  c.x+=c.vx*dt*dpr;
  c.y+=c.vy*dt*dpr;

  if(c.x-c.r<0||c.x+c.r>W) c.vx*=-1;
  if(c.y-c.r<0||c.y+c.r>H) c.vy*=-1;

  c.flash=Math.max(0,c.flash-dt*3);
 }

 for(let i=0;i<circles.length;i++){
  for(let j=i+1;j<circles.length;j++){
   let a=circles[i], b=circles[j];
   let dx=b.x-a.x, dy=b.y-a.y;
   let dist=Math.hypot(dx,dy);
   if(dist<a.r+b.r){
    let impact=Math.min(1,Math.abs(a.vx-b.vx)/400);
    playSound(a,b,impact);
    a.vx*=-1; b.vx*=-1;
    a.flash=1; b.flash=1;
   }
  }
 }

 for(let c of circles){
  ctx.beginPath();
  ctx.arc(c.x,c.y,c.r,0,Math.PI*2);
  ctx.fillStyle=`hsl(${c.n%360} 80% 60%)`;
  ctx.fill();
  ctx.fillStyle="#fff";
  ctx.textAlign="center";
  ctx.textBaseline="middle";
  ctx.font=`${c.r*.8}px sans-serif`;
  ctx.fillText(c.n,c.x,c.y);
 }

 requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
