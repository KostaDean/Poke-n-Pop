<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Screamsaver — Piglet Pop + Sliders</title>
<style>
  html,body{margin:0;height:100%;background:#000;overflow:hidden;font-family:system-ui}
  canvas{display:block;width:100vw;height:100vh;touch-action:none}
  #panel{
    position:fixed;top:14px;left:14px;right:14px;
    background:rgba(20,20,22,.9);color:#fff;border-radius:18px;padding:12px 12px 10px;
    box-shadow:0 20px 60px rgba(0,0,0,.55);
    -webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);
    user-select:none
  }
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
  button,select{
    font-size:18px;border-radius:14px;padding:8px 14px;margin:0;
    border:1px solid rgba(255,255,255,.35);
    background:rgba(255,255,255,.10);color:#fff
  }
  .sliderRow{display:grid;grid-template-columns:140px 1fr 56px;gap:10px;align-items:center;margin:10px 0}
  .label{opacity:.9;font-size:16px}
  input[type="range"]{width:100%}
  .val{font-variant-numeric:tabular-nums;text-align:right;opacity:.95}
  .hint{font-size:13px;opacity:.8;line-height:1.25;margin-top:6px}

  #fxLayer{
    position:fixed;left:0;top:0;right:0;bottom:0;
    pointer-events:none;overflow:visible;z-index:900;
  }
  .pigletClip{
    position:absolute;
    width:96px;height:96px;
    transform:translate(-50%,-50%);
    border-radius:22px;
    box-shadow:0 10px 30px rgba(0,0,0,.45);
    opacity:0.98;
    mix-blend-mode:screen;
  }
  .pigletFallback{
    position:absolute;
    transform:translate(-50%,-50%);
    font-size:64px;
    filter: drop-shadow(0 10px 16px rgba(0,0,0,.5));
    opacity:0.95;
  }
</style>
</head>
<body>

<canvas id="c"></canvas>
<div id="fxLayer"></div>

<div id="panel">
  <div class="row">
    <button id="reset">Reset</button>
    <button id="pause">Pause</button>
    <button id="soundBtn">Sound On</button>
    <select id="popMode" title="Pop sound">
      <option value="synth">Pop: Synth</option>
      <option value="thunder">Pop: Thunder MP3</option>
    </select>
  </div>

  <div class="sliderRow">
    <div class="label">Speed</div>
    <input id="speed" type="range" min="0.3" max="3.0" step="0.05" value="1.4">
    <div class="val" id="speedV">1.40</div>
  </div>

  <div class="sliderRow">
    <div class="label">Size</div>
    <input id="size" type="range" min="0.5" max="1.8" step="0.05" value="1.0">
    <div class="val" id="sizeV">1.00</div>
  </div>

  <div class="sliderRow">
    <div class="label">Tap radius</div>
    <input id="tapPad" type="range" min="0" max="36" step="1" value="10">
    <div class="val" id="tapPadV">10</div>
  </div>

  <div class="hint">
    • Single tap a circle to CAPTURE (squiggle + oik‑oik), then it POPS or ESCAPES.<br>
    • Double tap anywhere to hide/show this panel (single tap won’t toggle).<br>
    • Purple puff is local (no screen flash).
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d");
  const panel = document.getElementById("panel");

  // Prevent panel interaction from triggering canvas taps
  ["pointerdown","touchstart","mousedown","click"].forEach(ev=>{
    panel.addEventListener(ev, e=>e.stopPropagation(), {passive:false});
  });

  // HiDPI sizing
  let dpr = Math.max(1, Math.min(3, window.devicePixelRatio || 1));
  function resize(){
    dpr = Math.max(1, Math.min(3, window.devicePixelRatio || 1));
    canvas.width = Math.floor(innerWidth * dpr);
    canvas.height = Math.floor(innerHeight * dpr);
    canvas.style.width = innerWidth + "px";
    canvas.style.height = innerHeight + "px";
  }
  addEventListener("resize", resize, {passive:true});
  resize();

  // ---------------- Audio (iOS unlock safe) ----------------
  let audioOn = true;
  let ac = null, master = null;

  // External MP3 thunder (optional)
  // Put your MP3 at: assets/sfx/thunder.mp3 (or update path below)
  const thunder = new Audio("assets/sfx/thunder.mp3");
  thunder.preload = "auto";
  thunder.volume = 1.0;

  function ensureAudio(){
    if(!audioOn) return null;
    // Unlock AudioContext for synth
    if(!ac){
      ac = new (window.AudioContext || window.webkitAudioContext)();
      master = ac.createGain();
      master.gain.value = 0.95;
      master.connect(ac.destination);
    }
    if(ac.state === "suspended"){ try{ ac.resume(); }catch(e){} }
    // Prime <audio> too (gesture required on iOS)
    try{
      thunder.muted = false;
      thunder.play().then(()=>{ thunder.pause(); thunder.currentTime = 0; }).catch(()=>{});
    }catch(e){}
    return ac;
  }

  function blip(freq=220,vol=0.14,dur=0.05,type="sine"){
    if(!audioOn) return;
    const A = ensureAudio(); if(!A) return;
    const t=A.currentTime;
    const o=A.createOscillator();
    const g=A.createGain();
    o.type=type;
    o.frequency.setValueAtTime(freq,t);
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(Math.max(0.0002,vol),t+0.006);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(g); g.connect(master);
    o.start(t); o.stop(t+dur+0.02);
  }

  // --- Piglet-style "oink" synth (no external files) ---
  function pigOink(vol=0.22, dur=0.12, f0=520){
    if(!audioOn) return;
    const A = ensureAudio(); if(!A) return;
    const t = A.currentTime;
    const o = A.createOscillator();
    const g = A.createGain();
    o.type = "triangle";
    o.frequency.setValueAtTime(f0, t);
    o.frequency.exponentialRampToValueAtTime(Math.max(95, f0*0.35), t+dur);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(Math.max(0.0002, vol), t+0.010);
    g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
    o.connect(g); g.connect(master);
    o.start(t); o.stop(t+dur+0.04);
  }

  function oikOik(){
    pigOink(0.22, 0.10, 560);
    setTimeout(()=>pigOink(0.18, 0.10, 430), 95);
  }

  // Lightning-ish synth pop (fallback)
  function lightningPopSynth(){
    if(!audioOn) return;
    blip(1400, 0.45, 0.02, "square");     // crack
    blip(900,  0.22, 0.03, "sawtooth");   // snap
    const A = ensureAudio(); if(!A) return;
    const t=A.currentTime;
    const o=A.createOscillator();
    const g=A.createGain();
    o.type="sine";
    o.frequency.setValueAtTime(220,t);
    o.frequency.exponentialRampToValueAtTime(55,t+0.22);
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(0.9,t+0.015);
    g.gain.exponentialRampToValueAtTime(0.0001,t+0.26);
    o.connect(g); g.connect(master);
    o.start(t); o.stop(t+0.30);
  }

  function lightningPopThunderMp3(){
    if(!audioOn) return;
    try{
      thunder.currentTime = 0;
      thunder.volume = 1.0;
      thunder.play().catch(()=>{});
    }catch(e){}
  }

  // ---------------- Lightning visual ----------------
  // Optional lightning PNG/JPG (transparent background recommended)
  // Put at: assets/img/lightning.png
  const lightningImg = new Image();
  lightningImg.src = "assets/img/lightning.png";
  let lightningImgReady = false;
  lightningImg.onload = ()=>{ lightningImgReady = true; };

  // flash state
  let flash=0, fx=0, fy=0;
  let screenFlash=0;

  // purple haze "puff" particles (for POP)
  const puffs = []; // {x,y,r,life}
  function addPurplePuff(x,y,baseR){
    puffs.push({ x, y, r: Math.max(14*dpr, baseR*1.05), life: 1.0 });
  }
  function drawPurplePuffs(){
    if(!puffs.length) return;
    ctx.save();
    ctx.globalCompositeOperation = "lighter";
    for(let i=puffs.length-1;i>=0;i--){
      const p = puffs[i];
      const a = p.life;
      const R = p.r * (1.0 + (1.8*(1-a)));
      const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, R);
      g.addColorStop(0, `rgba(240,170,255,${0.78*a})`);
      g.addColorStop(0.28, `rgba(200,80,255,${0.44*a})`);
      g.addColorStop(0.62, `rgba(140,30,220,${0.16*a})`);
      g.addColorStop(1, "rgba(120,0,180,0)");
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(p.x, p.y, R, 0, Math.PI*2);
      ctx.fill();

      p.life -= 0.075;
      if(p.life <= 0) puffs.splice(i,1);
    }
    ctx.restore();
  }

  // Screen-wide flash removed (user request). Keep as noop for now.
  function drawLightning(){ /* no-op */ }

  // ---------------- Controls ----------------
  const speedEl = document.getElementById("speed");
  const sizeEl  = document.getElementById("size");
  const tapPadEl= document.getElementById("tapPad");
  const popModeEl = document.getElementById("popMode");
  const speedV = document.getElementById("speedV");
  const sizeV  = document.getElementById("sizeV");
  const tapPadV= document.getElementById("tapPadV");

  let speedMul = parseFloat(speedEl.value);
  let sizeMul  = parseFloat(sizeEl.value);
  let tapPad   = parseFloat(tapPadEl.value);

  function syncLabels(){
    speedV.textContent = speedMul.toFixed(2);
    sizeV.textContent  = sizeMul.toFixed(2);
    tapPadV.textContent = Math.round(tapPad).toString();
  }
  syncLabels();

  speedEl.addEventListener("input", ()=>{ speedMul = parseFloat(speedEl.value); syncLabels(); });
  sizeEl.addEventListener("input",  ()=>{ sizeMul  = parseFloat(sizeEl.value); syncLabels(); });
  tapPadEl.addEventListener("input",()=>{ tapPad   = parseFloat(tapPadEl.value); syncLabels(); });

  // ---------------- Circles ----------------
  let circles = [];
  function rand(a,b){ return a + Math.random()*(b-a); }

  function seed(n=18){
    circles = [];
    for(let i=0;i<n;i++){
      const baseR = rand(18, 44) * dpr;
      circles.push({
        x: rand(baseR, canvas.width-baseR),
        y: rand(baseR, canvas.height-baseR),
        r0: baseR,
        vx: rand(-1.9, 1.9) * dpr,
        vy: rand(-1.9, 1.9) * dpr
      });
    }
  }
  seed(18);

  function radius(c){ return c.r0 * sizeMul; }

  function collide(a,b){
    const ar = radius(a), br = radius(b);
    const dx=b.x-a.x, dy=b.y-a.y;
    const dist=Math.hypot(dx,dy);
    const min=ar+br;
    if(dist<min && dist>0.0001){
      const nx=dx/dist, ny=dy/dist;
      const overlap=min-dist;
      a.x-=nx*overlap/2; a.y-=ny*overlap/2;
      b.x+=nx*overlap/2; b.y+=ny*overlap/2;

      const dvx=b.vx-a.vx, dvy=b.vy-a.vy;
      const vn=dvx*nx + dvy*ny;
      if(vn<0){
        const imp = -vn;
        a.vx -= imp*nx; a.vy -= imp*ny;
        b.vx += imp*nx; b.vy += imp*ny;
        // Piglets running around: tiny randomized oinks (rate limited)
        const now = performance.now();
        if(!collide._t || (now - collide._t) > 70){
          collide._t = now;
          pigOink(0.09, 0.07, 280 + Math.random()*220);
        }
      }
    }
  }

  let paused = false;

  function step(){
    if(paused) return;

    const now = performance.now();

    for(const c of circles){
      // "Captured" circle squiggles under the finger briefly
      if(c._captured && now < c._captured.until){
        const amp = 7*dpr;
        const t = (now - c._captured.t0) / 40;
        c.x = c._captured.tx + Math.sin(t*2.4) * amp * 0.55 + (Math.random()-0.5)*amp*0.25;
        c.y = c._captured.ty + Math.cos(t*2.1) * amp * 0.55 + (Math.random()-0.5)*amp*0.25;
        continue;
      }

      c.x += c.vx * speedMul;
      c.y += c.vy * speedMul;

      const r = radius(c);
      if(c.x-r<0){ c.x=r; c.vx*=-1; }
      if(c.x+r>canvas.width){ c.x=canvas.width-r; c.vx*=-1; }
      if(c.y-r<0){ c.y=r; c.vy*=-1; }
      if(c.y+r>canvas.height){ c.y=canvas.height-r; c.vy*=-1; }
    }

    for(let i=0;i<circles.length;i++){
      for(let j=i+1;j<circles.length;j++){
        // Skip collisions for circles that are currently captured (prevents jitter fights)
        if(circles[i]._captured || circles[j]._captured) continue;
        collide(circles[i], circles[j]);
      }
    }
  }


  function draw(){
    ctx.fillStyle="#000";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    for(const c of circles){
      const r = radius(c);
      const sx = c._squashX || 1;
      const sy = c._squashY || 1;
      ctx.save();
      ctx.translate(c.x, c.y);
      ctx.scale(sx, sy);
      ctx.fillStyle="#d85a4a";
      ctx.beginPath();
      ctx.arc(0,0,r,0,Math.PI*2);
      ctx.fill();
      // thickness / outline
      ctx.lineWidth = Math.max(2.5*dpr, r*0.10);
      ctx.strokeStyle = "rgba(255,255,255,0.32)";
      ctx.stroke();
      ctx.restore();
    }

    drawPurplePuffs();
    drawLightning();
  }

  function loop(){
    step();
    draw();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  
  
  // ---------------- Piglet clip overlay ----------------
  const fxLayer = document.getElementById("fxLayer");

  function showPigletClip(clientX, clientY){
    // Tries to play a short piglet video at the capture point.
    // Put a file named "piglet.mp4" next to this html file (same folder).
    // iOS requires muted + playsInline for autoplay; we set both.
    const v = document.createElement("video");
    v.className = "pigletClip";
    v.src = "piglet.mp4";
    v.muted = true;
    v.playsInline = true;
    v.loop = true;
    v.autoplay = true;
    v.preload = "auto";

    v.style.left = clientX + "px";
    v.style.top  = clientY + "px";

    fxLayer.appendChild(v);

    // Try to start immediately; if blocked or missing file, fall back to emoji pig.
    const tryPlay = v.play();
    if(tryPlay && typeof tryPlay.catch === "function"){
      tryPlay.catch(()=>{ 
        try{ v.remove(); }catch(_){}
        return showPigletFallback(clientX, clientY);
      });
    }

    // If file 404/missing, 'error' fires.
    v.addEventListener("error", ()=>{
      try{ v.remove(); }catch(_){}
      showPigletFallback(clientX, clientY);
    }, {once:true});

    return { el:v, remove:()=>{ try{ v.pause(); v.remove(); }catch(_){} } };
  }

  function showPigletFallback(clientX, clientY){
    const d = document.createElement("div");
    d.className = "pigletFallback";
    d.textContent = "🐷";
    d.style.left = clientX + "px";
    d.style.top  = clientY + "px";
    fxLayer.appendChild(d);
    return { el:d, remove:()=>{ try{ d.remove(); }catch(_){} } };
  }

// ---------------- Tap handling ----------------
  // IMPORTANT: iOS may fire both pointer + touch events unless we avoid double-binding.
  // We bind ONE unified handler (pointer if available, else touch).
  let lastTap = null; // {t,x,y}
  let activeCapture = null; // {circle, idx}

  function findCircleHit(x,y){
    for(let i=circles.length-1;i>=0;i--){
      const c = circles[i];
      const r = radius(c);
      const rr = r + tapPad*dpr;
      const dx=x-c.x, dy=y-c.y;
      if(dx*dx + dy*dy <= rr*rr) return {i,c,r};
    }
    return null;
  }

  function doPopAtCircle(idx, c){
    circles.splice(idx,1);

    // Local purple haze puff (no screen-wide flash)
    addPurplePuff(c.x, c.y, radius(c));

    // piglet "pop" (a slightly sharper oink)
    pigOink(0.26, 0.10, 520);
  }

  function beginCapture(hit, tx, ty, clientX, clientY){
    if(!hit) return false;
    const {i,c,r} = hit;

    // only one capture at a time
    if(activeCapture && activeCapture.circle && activeCapture.circle._captured){
      activeCapture.circle._captured = null;
    }
    activeCapture = { circle:c, idx:i };

    const p = c.x, q = c.y;
    const distPQ = Math.hypot(p-tx, q-ty);

    // "under the thumb" squiggle for a short moment
    const dur = 320; // ms
    const now = performance.now();
    c._captured = { tx, ty, t0: now, until: now + dur, p, q, r, distPQ, vx:c.vx, vy:c.vy };

    // "feel" the poke: flatten while captured
    c._squashX = 1.18;
    c._squashY = 0.72;

    // piglet oik‑oik while captured
    oikOik();

    // piglet VIDEO clip at capture point (or emoji fallback if missing)
    const capPiglet = showPigletClip(clientX ?? (tx/dpr), clientY ?? (ty/dpr));

    // decide after squiggle: POP if tap is close enough; else ESCAPE
    setTimeout(()=>{
      // circle may already be gone or re-captured
      const ci = circles.indexOf(c);
      if(capPiglet) capPiglet.remove();
      if(ci === -1) return;
      const cap = c._captured;
      c._captured = null;

      // restore shape
      c._squashX = 1;
      c._squashY = 1;

      // POP rule
      if(cap && cap.distPQ < (0.5 * cap.r)){
        doPopAtCircle(ci, c);
        return;
      }

      // ESCAPE (your 4 quadrant rules all map to escape if not pop)
      // direction: from tap (x,y) toward original center (p,q); speed doubled
      const dx = (cap ? cap.p : c.x) - (cap ? cap.tx : tx);
      const dy = (cap ? cap.q : c.y) - (cap ? cap.ty : ty);
      const d  = Math.hypot(dx,dy) || 1;
      const ux = dx/d, uy = dy/d;

      const base = Math.hypot(cap?.vx ?? c.vx, cap?.vy ?? c.vy);
      const sp = Math.max(1.6*dpr, base) * 2.0;

      c.vx = ux * sp;
      c.vy = uy * sp;

      // nudge it immediately so it "breaks free"
      c.x = (cap ? cap.tx : tx) + ux * (cap ? cap.r : radius(c)) * 0.65;
      c.y = (cap ? cap.ty : ty) + uy * (cap ? cap.r : radius(c)) * 0.65;

    }, dur);

    return true;
  }

  function getXY(e){
    const rect = canvas.getBoundingClientRect();
    let cx, cy;
    if(e.touches && e.touches[0]){ cx = e.touches[0].clientX; cy = e.touches[0].clientY; }
    else { cx = e.clientX; cy = e.clientY; }
    return { 
      x:(cx-rect.left)*dpr, 
      y:(cy-rect.top)*dpr,
      cx, cy
    };
  }

  function togglePanel(){
    panel.style.display = (panel.style.display==="none") ? "block" : "none";
  }

  function onUnifiedTap(e){
    // Ignore right-click
    if(e.button && e.button !== 0) return;

    const {x,y,cx,cy} = getXY(e);
    const now = performance.now();
    const doubleDist2 = (26*dpr) * (26*dpr);
    const isDouble = !!(lastTap && (now-lastTap.t)<300 && ((x-lastTap.x)**2 + (y-lastTap.y)**2) < doubleDist2);

    if(isDouble){
      lastTap = null;
      togglePanel();
      e.preventDefault();
      return;
    }
    lastTap = {t:now,x,y};

    ensureAudio();
    const hit = findCircleHit(x,y);
    if(hit) beginCapture(hit, x, y, cx, cy);
    e.preventDefault();
  }

  if(window.PointerEvent){
    canvas.addEventListener("pointerdown", onUnifiedTap, {passive:false});
  } else {
    canvas.addEventListener("touchstart", onUnifiedTap, {passive:false});
    canvas.addEventListener("mousedown", onUnifiedTap, {passive:false});
  }

  // ---------------- UI buttons ----------------
  document.getElementById("reset").onclick = ()=> seed(18);
  document.getElementById("pause").onclick = ()=> paused = !paused;

  const soundBtn = document.getElementById("soundBtn");
  soundBtn.onclick = () => {
    audioOn = !audioOn;
    soundBtn.textContent = audioOn ? "Sound On" : "Sound Off";
    thunder.muted = !audioOn;
    if(audioOn) ensureAudio();
  };

})();
</script>

<!--
USING YOUR OWN FILES (GitHub Pages):
1) Put thunder MP3 here:
   assets/sfx/thunder.mp3

2) Put a lightning image (PNG with transparency recommended) here:
   assets/img/lightning.png

If you want different filenames, edit these two lines in the code:
  const thunder = new Audio("assets/sfx/thunder.mp3");
  lightningImg.src = "assets/img/lightning.png";
-->
</body>
</html>
