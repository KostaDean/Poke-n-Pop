<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Circle Division Screensaver</title>
<style>
  html, body { margin:0; padding:0; width:100%; height:100%; background:#0b0f14; overflow:hidden; }
  canvas { display:block; width:100vw; height:100vh; touch-action: none; }
  .ui {
    position: fixed; left: 12px; top: 12px; z-index: 10;
    font: 14px/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: rgba(255,255,255,0.85);
    background: rgba(0,0,0,0.35);
    padding: 10px 12px; border-radius: 10px;
    backdrop-filter: blur(6px);
    user-select:none;
    max-width: 320px;
  }
  .ui button{
    border: 1px solid rgba(255,255,255,0.22);
    background: rgba(255,255,255,0.10);
    border-radius: 9px;
    padding: 6px 10px;
    cursor: pointer;
  }
  .row { display:flex; align-items:center; gap:10px; margin-top:8px; }
  .row label { width: 64px; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d', { alpha: false });

  const state = {
    circles: [],
    lastT: performance.now(),
    dpr: Math.max(1, Math.min(3, window.devicePixelRatio || 1)),
    running: true
  };

  function resize() {
    state.dpr = Math.max(1, Math.min(3, window.devicePixelRatio || 1));
    canvas.width = Math.floor(innerWidth * state.dpr);
    canvas.height = Math.floor(innerHeight * state.dpr);
  }
  window.addEventListener('resize', resize);
  resize();

  function rand(min,max){ return min + Math.random()*(max-min); }

  function randColor(){
    const h = Math.floor(Math.random()*360);
    return `hsl(${h} 85% 60%)`;
  }

  function makeCircle(){
    const R = 18 * state.dpr;
    const x = rand(R, canvas.width - R);
    const y = rand(R, canvas.height - R);
    const a = rand(0, Math.PI*2);
    const speed = 160 * state.dpr;
    return {
      x, y,
      vx: Math.cos(a)*speed,
      vy: Math.sin(a)*speed,
      r: R,
      m: R*R,
      n: Math.floor(rand(2,150)),
      color: randColor(),
      flash:0,
      lastMath: -1
    };
  }

  function init(count=25){
    state.circles = [];
    for(let i=0;i<count;i++){
      state.circles.push(makeCircle());
    }
  }

  function resolve(a,b,now){
    const dx = b.x-a.x;
    const dy = b.y-a.y;
    const dist2 = dx*dx+dy*dy;
    const minDist = a.r+b.r;
    if(dist2 < minDist*minDist && dist2>0){
      const dist = Math.sqrt(dist2);
      const nx = dx/dist;
      const ny = dy/dist;

      const overlap = minDist-dist;
      a.x -= nx*overlap/2;
      a.y -= ny*overlap/2;
      b.x += nx*overlap/2;
      b.y += ny*overlap/2;

      const rvx = b.vx-a.vx;
      const rvy = b.vy-a.vy;
      const vel = rvx*nx+rvy*ny;
      if(vel>0) return;

      const j = -2*vel/(1/a.m+1/b.m);
      a.vx -= (j*nx)/a.m;
      a.vy -= (j*ny)/a.m;
      b.vx += (j*nx)/b.m;
      b.vy += (j*ny)/b.m;

      // division rule with disappearance
      if(now-a.lastMath>0.2 && now-b.lastMath>0.2){
        let L=a, S=b;
        if(b.n>a.n){ L=b; S=a; }
        if(L.n!==S.n){
          const q = Math.floor(L.n/S.n);
          const r = L.n%S.n;
          L.n = q;

          // remove circle if becomes 1
          if(L.n<=1){
            state.circles = state.circles.filter(c=>c!==L);
          }

          if(r>1 && state.circles.length<150){
            const c = makeCircle();
            c.n = r;
            c.x = L.x + nx*(L.r+c.r+5);
            c.y = L.y + ny*(L.r+c.r+5);
            state.circles.push(c);
          }
        }
        a.lastMath = now;
        b.lastMath = now;
      }
    }
  }

  function step(dt,now){
    for(const c of state.circles){
      c.x+=c.vx*dt;
      c.y+=c.vy*dt;

      if(c.x-c.r<0){c.x=c.r;c.vx=Math.abs(c.vx);}
      if(c.x+c.r>canvas.width){c.x=canvas.width-c.r;c.vx=-Math.abs(c.vx);}
      if(c.y-c.r<0){c.y=c.r;c.vy=Math.abs(c.vy);}
      if(c.y+c.r>canvas.height){c.y=canvas.height-c.r;c.vy=-Math.abs(c.vy);}
    }

    for(let i=0;i<state.circles.length;i++){
      for(let j=i+1;j<state.circles.length;j++){
        resolve(state.circles[i],state.circles[j],now);
      }
    }
  }

  function draw(){
    ctx.fillStyle="#0b0f14";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.textAlign="center";
    ctx.textBaseline="middle";

    for(const c of state.circles){
      ctx.beginPath();
      ctx.arc(c.x,c.y,c.r,0,Math.PI*2);
      ctx.fillStyle=c.color;
      ctx.fill();
      ctx.fillStyle="#fff";
      ctx.font=`${c.r*0.9}px Arial`;
      ctx.fillText(c.n,c.x,c.y);
    }

    ctx.strokeStyle="rgba(255,255,255,0.25)";
    ctx.strokeRect(0,0,canvas.width,canvas.height);
  }

  function loop(t){
    const dt=Math.min(0.03,(t-state.lastT)/1000);
    state.lastT=t;
    const now=t/1000;
    step(dt,now);
    draw();
    requestAnimationFrame(loop);
  }

  init();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
