
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Piglet Escape</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#143d63;font-family:sans-serif}
canvas{display:block;width:100%;height:100%}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const c=document.getElementById("c")
const x=c.getContext("2d")
let W,H
function resize(){W=c.width=innerWidth;H=c.height=innerHeight}
resize()
addEventListener("resize",resize)

let speed=4
let circles=[]
let N=10

for(let i=0;i<N;i++){
circles.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-0.5)*speed,vy:(Math.random()-0.5)*speed,r:28})
}

let audioCtx=null
function collisionSound(){
if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)()
const o=audioCtx.createOscillator()
const g=audioCtx.createGain()
o.type="triangle"
o.frequency.value=160+Math.random()*80
g.gain.value=0.05
o.connect(g)
g.connect(audioCtx.destination)
o.start()
o.stop(audioCtx.currentTime+0.05)
}

function popBoost(){
speed+=2
for(const p of circles){
const a=Math.atan2(p.vy,p.vx)
p.vx=Math.cos(a)*speed
p.vy=Math.sin(a)*speed
}
}

c.addEventListener("pointerdown",e=>{
const rect=c.getBoundingClientRect()
const mx=e.clientX-rect.left
const my=e.clientY-rect.top
for(let i=circles.length-1;i>=0;i--){
const p=circles[i]
const d=Math.hypot(mx-p.x,my-p.y)
if(d<p.r){
circles.splice(i,1)
popBoost()
break
}
}
})

function step(){
x.clearRect(0,0,W,H)
for(let p of circles){
p.x+=p.vx
p.y+=p.vy

if(p.x<p.r||p.x>W-p.r){p.vx*=-1;collisionSound()}
if(p.y<p.r||p.y>H-p.r){p.vy*=-1;collisionSound()}

x.beginPath()
x.arc(p.x,p.y,p.r,0,Math.PI*2)
x.fillStyle="#e79cab"
x.fill()
}

requestAnimationFrame(step)
}

step()
</script>
</body>
</html>
