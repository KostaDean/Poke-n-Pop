<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Number Collisions: Real Sound FX</title>
<style>
html,body{margin:0;height:100%;background:#0b0f14;overflow:hidden;font-family:-apple-system,system-ui;}
canvas{display:block;touch-action:manipulation;}
#panel{
 position:fixed;top:12px;left:12px;right:12px;
 background:rgba(0,0,0,.55); color:#fff;
 padding:12px;border-radius:14px;backdrop-filter:blur(8px);
 max-width:560px;margin:0 auto;
}
.controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
button,select{
 padding:10px 14px;border-radius:12px;border:1px solid #888;
 background:#222;color:#fff;font-size:16px;
}
.small{font-size:12px;opacity:.85;margin-top:8px;line-height:1.25}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="panel">
  <div class="controls">
    <button id="soundBtn">Sound On</button>
    <select id="soundStyle">
      <option value="synth">Synth</option>
      <option value="piano">Piano</option>
      <option value="laugh">Laughter</option>
      <option value="bark">Puppy Bark</option>
      <option value="meow">Cat Meow</option>
      <option value="roar">Lion Roar</option>
    </select>
    <button id="testSound">Test</button>
  </div>
  <div class="small">Uses real MP3 files from assets/sfx/ folder.</div>
</div>

<script>
let audioOn = false;
let soundStyle = "synth";

// --- preload real sound files ---
const sfx = {
  piano: new Audio("assets/sfx/Piano1.mp3"),
  laugh: new Audio("assets/sfx/Laughter2.mp3"),
  bark:  new Audio("assets/sfx/DogBark2.mp3"),
  meow:  new Audio("assets/sfx/CatMeaw1.mp3"),
  roar:  new Audio("assets/sfx/LionRoar.mp3")
};

Object.values(sfx).forEach(a=>{
  a.preload="auto";
});

document.getElementById("soundBtn").onclick = ()=>{
  audioOn = !audioOn;
  document.getElementById("soundBtn").textContent = audioOn ? "Sound Off" : "Sound On";
};

document.getElementById("soundStyle").onchange = e=>{
  soundStyle = e.target.value;
};

document.getElementById("testSound").onclick = ()=>{
  playSound(1.0);
};

function playSound(volume){
  if(!audioOn) return;

  if(soundStyle === "synth"){
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = "triangle";
    o.frequency.value = 440;
    g.gain.value = 0.3;
    o.connect(g); g.connect(ctx.destination);
    o.start(); o.stop(ctx.currentTime + 0.2);
    return;
  }

  const snd = sfx[soundStyle];
  if(!snd) return;
  const clone = snd.cloneNode(); // allows overlapping playback
  clone.volume = volume;
  clone.play();
}
</script>
</body>
</html>
