<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<style>
html,body{
  margin:0;
  padding:0;
  background:#000;
  overflow:hidden;
  font-family:system-ui;
}
canvas{
  display:block;
  touch-action:none;
}
#panel{
  position:fixed;
  top:10px;
  left:10px;
  right:10px;
  background:#111;
  color:#fff;
  padding:15px;
  border-radius:16px;
}
button,select,input{
  font-size:16px;
  margin:4px;
}
.row{
  margin:8px 0;
}
label{
  display:inline-block;
  width:100px;
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="panel">
  <button id="soundBtn">Sound On</button>
  <select id="soundType">
    <option value="synth">Synth</option>
  </select>
  <button id="resetBtn">Reset</button>
  <button id="pauseBtn">Pause</button>

  <div class="row">
    <label>Min circles</label>
    <input type="range" id="minRange" min="5" max="60" value="30">
  </div>

  <div class="row">
    <label>Seed rate</label>
    <input type="range" id="seedRange" min="0.2" max="3" step="0.1" value="1.2">
  </div>

  <div style="font-size:14px;margin-top:8px;">
    Double-tap anywhere to hide/show this panel.
  </div>
</div>

<script>
const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");

function resize(){
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

let circles=[];
let minCircles=30;
let seedRate=1.2;
let paused=false;
let soundOn=true;

const audioCtx=new (window.AudioContext||window.webkitAudioContext)();

function playSound(){
  if(!soundOn) return;
  const osc=audioCtx.createOscillator();
  const gain=audioCtx.createGain();
  osc.frequency.value=300+Math.random()*400;
  gain.gain.value=0.2;
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime+0.1);
}

function addCircle(){
  circles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:20+Math.random()*20,
    vx:(Math.random()-0.5)*2,
    vy:(Math.random()-0.5)*2
  });
}

function update(){
  if(paused) return;

  while(circles.length<minCircles){
    addCircle();
  }

  circles.forEach(c=>{
    c.x+=c.vx;
    c.y+=c.vy;
    if(c.x<0||c.x>canvas.width) c.vx*=-1;
    if(c.y<0||c.y>canvas.height) c.vy*=-1;
  });

  for(let i=0;i<circles.length;i++){
    for(let j=i+1;j<circles.length;j++){
      const a=circles[i];
      const b=circles[j];
      const dx=a.x-b.x;
      const dy=a.y-b.y;
      const d=Math.hypot(dx,dy);
      if(d<a.r+b.r){
        a.vx*=-1;
        a.vy*=-1;
        b.vx*=-1;
        b.vy*=-1;
        playSound();
      }
    }
  }
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  circles.forEach(c=>{
    ctx.beginPath();
    ctx.arc(c.x,c.y,c.r,0,Math.PI*2);
    ctx.fillStyle="#e74c3c";
    ctx.fill();
  });
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();

document.getElementById("soundBtn").onclick=()=>{
  soundOn=!soundOn;
  document.getElementById("soundBtn").textContent=soundOn?"Sound On":"Sound Off";
};

document.getElementById("resetBtn").onclick=()=>{
  circles=[];
};

document.getElementById("pauseBtn").onclick=()=>{
  paused=!paused;
};

document.getElementById("minRange").oninput=e=>{
  minCircles=parseInt(e.target.value);
};

document.getElementById("seedRange").oninput=e=>{
  seedRate=parseFloat(e.target.value);
};

let lastTap=0;
canvas.addEventListener("touchend",e=>{
  const now=Date.now();
  if(now-lastTap<300){
    const panel=document.getElementById("panel");
    panel.style.display=panel.style.display==="none"?"block":"none";
  }
  lastTap=now;
});
</script>
</body>
</html>
