<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Collision Music + Division + Growth (Reseed)</title>
<style>
html,body{margin:0;height:100%;background:#0b0f14;overflow:hidden;font-family:-apple-system;}
canvas{display:block}
#panel{
 position:fixed;top:12px;left:12px;background:rgba(0,0,0,.5);
 color:#fff;padding:12px;border-radius:12px;backdrop-filter:blur(6px);
 max-width: 380px;
}
button{padding:8px 12px;border-radius:10px;border:1px solid #888;background:#222;color:#fff}
select{padding:8px 10px;border-radius:10px;border:1px solid #888;background:#222;color:#fff}
option{color:#111}
.small{font-size:12px;opacity:.85;margin-top:6px;line-height:1.25}
.row{display:flex;gap:8px;align-items:center;margin-top:8px}
label{font-size:12px;opacity:.85;width:90px}
input[type=range]{width:170px}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="panel">
  <div style="display:flex;gap:8px;flex-wrap:wrap">
    <button id="startAudio">Sound On</button>
    <select id="soundStyle" title="Collision sound style">
  <option value="synth">Synth</option>
  <option value="piano">Piano chords</option>
  <option value="laugh">Laughter</option>
  <option value="bark">Puppy bark</option>
  <option value="meow">Cat meow</option>
  <option value="roar">Lion roar</option>
</select>
<button id="testSound">Test</button>
<button id="reset">Reset</button>
    <button id="pause">Pause</button>
  </div>
  <div class="small">
    Collision: sound + both +1, then division (L→q, remainder r spawns).
    <br><b>Auto-reseed:</b> keeps at least <span id="minVal">30</span> circles by spawning new ones.
  </div>
  <div class="row">
    <label>Min circles</label>
    <input id="minCircles" type="range" min="10" max="120" step="1" value="30">
    <span id="minOut">30</span>
  </div>
  <div class="row">
    <label>Seed rate</label>
    <input id="seedRate" type="range" min="0.2" max="5.0" step="0.1" value="1.2">
    <span id="seedOut">1.2</span>
  </div>
<div class="row">
    <label>Overlay</label>
    <input id="opac" type="range" min="0" max="0.98" step="0.01" value="0.88">
    <span id="opacOut">0.88</span>
  </div>
  <div class="row">
    <label>Hue</label>
    <input id="hue" type="range" min="0" max="360" step="1" value="200">
    <span id="hueOut">200</span>
  </div>
</div>

<script>

function ensureAudio(){
  if(!ac){
    const AC = window.AudioContext || window.webkitAudioContext;
    if(!AC) return null;
    ac = new AC();
    master = ac.createGain();
    master.gain.value = 1.0;
    master.connect(ac.destination);
  }
  return ac;
}

function env(g, t0, peak=0.24, a=0.008, d=0.18){
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(peak, t0+a);
  g.gain.exponentialRampToValueAtTime(0.0001, t0+Math.max(0.03,d));
}

function hslToRgb(h,s,l){
  h=((h%360)+360)%360;
  const c=(1-Math.abs(2*l-1))*s;
  const x=c*(1-Math.abs(((h/60)%2)-1));
  const m=l-c/2;
  let r1=0,g1=0,b1=0;
  if(h<60){r1=c;g1=x;}
  else if(h<120){r1=x;g1=c;}
  else if(h<180){g1=c;b1=x;}
  else if(h<240){g1=x;b1=c;}
  else if(h<300){r1=x;b1=c;}
  else {r1=c;b1=x;}
  return {r:Math.round((r1+m)*255),g:Math.round((g1+m)*255),b:Math.round((b1+m)*255)};
}

function playSynth(freq, amp){
  const ctx = ensureAudio(); if(!ctx) return;
  const t0 = ctx.currentTime;
  const o = ctx.createOscillator();
  const g = ctx.createGain();
  o.type = "sine";
  o.frequency.setValueAtTime(freq, t0);
  env(g, t0, 0.22*amp, 0.006, 0.14);
  o.connect(g); g.connect(master);
  o.start(t0); o.stop(t0+0.18);
}

function playPianoChord(freq, amp){
  const ctx = ensureAudio(); if(!ctx) return;
  const t0 = ctx.currentTime;
  const ratios=[1,1.2599,1.4983];
  const lp = ctx.createBiquadFilter();
  lp.type="lowpass"; lp.frequency.setValueAtTime(2600,t0); lp.Q.value=0.7;
  lp.connect(master);
  ratios.forEach((r,i)=>{
    const o=ctx.createOscillator();
    const g=ctx.createGain();
    o.type="triangle";
    o.frequency.setValueAtTime(freq*r, t0);
    env(g, t0, (0.18/(i+1))*amp, 0.006, 0.22);
    o.connect(g); g.connect(lp);
    o.start(t0); o.stop(t0+0.28);
  });
}

function playNoiseBurst(dur, amp, hp=120, bp=900, q=6){
  const ctx=ensureAudio(); if(!ctx) return;
  const t0=ctx.currentTime;
  const len=Math.max(1, Math.floor(ctx.sampleRate*dur));
  const buf=ctx.createBuffer(1,len,ctx.sampleRate);
  const data=buf.getChannelData(0);
  for(let i=0;i<len;i++) data[i]=(Math.random()*2-1);
  const src=ctx.createBufferSource(); src.buffer=buf;

  const hpf=ctx.createBiquadFilter(); hpf.type="highpass"; hpf.frequency.setValueAtTime(hp,t0);
  const bpf=ctx.createBiquadFilter(); bpf.type="bandpass"; bpf.frequency.setValueAtTime(bp,t0); bpf.Q.setValueAtTime(q,t0);
  const g=ctx.createGain(); env(g,t0,0.22*amp,0.006,dur);

  src.connect(hpf); hpf.connect(bpf); bpf.connect(g); g.connect(master);
  src.start(t0); src.stop(t0+dur+0.02);
}

function playBark(freq, amp){
  playNoiseBurst(0.10, amp, 180, 950, 6);
  const ctx=ensureAudio(); if(!ctx) return;
  const t0=ctx.currentTime;
  const o=ctx.createOscillator(); const g=ctx.createGain();
  o.type="sawtooth";
  const f0=220+(freq%120);
  o.frequency.setValueAtTime(f0,t0);
  o.frequency.exponentialRampToValueAtTime(f0*0.6,t0+0.08);
  env(g,t0,0.10*amp,0.004,0.10);
  o.connect(g); g.connect(master);
  o.start(t0); o.stop(t0+0.12);
}

function playMeow(freq, amp){
  const ctx=ensureAudio(); if(!ctx) return;
  const t0=ctx.currentTime;
  const o=ctx.createOscillator(); const g=ctx.createGain();
  o.type="triangle";
  const f1=380+(freq%260);
  const f2=f1*1.8;
  o.frequency.setValueAtTime(f1,t0);
  o.frequency.linearRampToValueAtTime(f2,t0+0.08);
  o.frequency.linearRampToValueAtTime(f1*0.85,t0+0.18);
  const lfo=ctx.createOscillator(); const lfoG=ctx.createGain();
  lfo.frequency.value=7; lfoG.gain.value=10;
  lfo.connect(lfoG); lfoG.connect(o.frequency);
  env(g,t0,0.18*amp,0.01,0.22);
  o.connect(g); g.connect(master);
  lfo.start(t0); lfo.stop(t0+0.22);
  o.start(t0); o.stop(t0+0.24);
}

function playRoar(freq, amp){
  const ctx=ensureAudio(); if(!ctx) return;
  const t0=ctx.currentTime;
  const dur=0.28;
  const len=Math.max(1, Math.floor(ctx.sampleRate*dur));
  const buf=ctx.createBuffer(1,len,ctx.sampleRate);
  const data=buf.getChannelData(0);
  for(let i=0;i<len;i++){
    data[i]= (i? (data[i-1] + (Math.random()*2-1)*0.08) : (Math.random()*2-1)*0.3);
  }
  const src=ctx.createBufferSource(); src.buffer=buf;

  const bp=ctx.createBiquadFilter(); bp.type="bandpass";
  bp.frequency.setValueAtTime(220,t0); bp.frequency.linearRampToValueAtTime(420,t0+dur); bp.Q.setValueAtTime(1.8,t0);

  const g=ctx.createGain();
  g.gain.setValueAtTime(0.0001,t0);
  g.gain.exponentialRampToValueAtTime(0.25*amp,t0+0.05);
  g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);

  src.connect(bp); bp.connect(g); g.connect(master);
  src.start(t0); src.stop(t0+dur+0.02);
}

function playLaugh(freq, amp){
  const ctx=ensureAudio(); if(!ctx) return;
  const now=ctx.currentTime;

  // "ha-ha" syllables: voiced oscillator + breathy noise + downward pitch bend
  const syllables = 6;                 // more obvious
  const gap = 0.07;
  const base = 220 + (freq % 220);

  // shared filter for a "mouth" formant
  const form = ctx.createBiquadFilter();
  form.type = "bandpass";
  form.frequency.setValueAtTime(900, now);
  form.Q.setValueAtTime(3.8, now);
  form.connect(master);

  for(let i=0;i<syllables;i++){
    const t0 = now + i*gap;

    // voiced component
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = "sawtooth";
    const fStart = base * (1.15 - i*0.02);
    const fEnd   = base * (0.78 - i*0.015);
    o.frequency.setValueAtTime(fStart, t0);
    o.frequency.exponentialRampToValueAtTime(Math.max(80, fEnd), t0+0.06);

    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(0.20*amp, t0+0.008);
    g.gain.exponentialRampToValueAtTime(0.0001, t0+0.065);

    o.connect(g); g.connect(form);
    o.start(t0); o.stop(t0+0.075);

    // breathy noise burst
    const dur = 0.065;
    const len = Math.max(1, Math.floor(ctx.sampleRate*dur));
    const buf = ctx.createBuffer(1,len,ctx.sampleRate);
    const d = buf.getChannelData(0);
    for(let j=0;j<len;j++) d[j] = (Math.random()*2-1);
    const ns = ctx.createBufferSource(); ns.buffer = buf;

    const ng = ctx.createGain();
    ng.gain.setValueAtTime(0.0001, t0);
    ng.gain.exponentialRampToValueAtTime(0.10*amp, t0+0.008);
    ng.gain.exponentialRampToValueAtTime(0.0001, t0+dur);

    ns.connect(ng); ng.connect(form);
    ns.start(t0); ns.stop(t0+dur+0.01);
  }
}

function playHitSound(numA, numB, impact=1){
(numA, numB, impact=1){
  if(!audioOn) return;
  const amp = Math.min(1, 0.55 + impact*0.35);
  // map numbers to a pleasant-ish frequency
  const base = 140 + ((numA + numB) % 48) * 12; // ~140..716
  switch(soundStyle){
    case "piano": playPianoChord(base, amp); break;
    case "laugh": playLaugh(base, amp); break;
    case "bark":  playBark(base, amp); break;
    case "meow":  playMeow(base, amp); break;
    case "roar":  playRoar(base, amp); break;
    case "synth":
    default:      playSynth(base, amp); break;
  }
}


const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d",{alpha:false});
let W,H,dpr;

function resize(){
  dpr=window.devicePixelRatio||1;
  canvas.width=Math.floor(innerWidth*dpr);
  canvas.height=Math.floor(innerHeight*dpr);
  W=canvas.width; H=canvas.height;
}
window.addEventListener("resize",resize); resize();

// AUDIO
let ac=null, master=null, audioOn=false;
function initAudio(){
  if(ac) return;
  ac=new (window.AudioContext||window.webkitAudioContext)();
  master=ac.createGain();
  master.gain.value=0.6;
  master.connect(ac.destination);
  const o=ac.createOscillator();
  const g=ac.createGain();
  o.type="sine"; o.frequency.value=440;
  g.gain.value=0.2;
  o.connect(g); g.connect(master);
  o.start(); o.stop(ac.currentTime+0.15);
}
document.getElementById("startAudio").onclick=async ()=>{
  initAudio();
  if(ac.state==="suspended") await ac.resume();
  audioOn=true;
};

function playHitSound(a,b,impact){
  if(!audioOn || !ac) return;
  const now=ac.currentTime;
  const f=110+((a.n*3 + b.n*5) % 1500);
  const o=ac.createOscillator();
  const g=ac.createGain();
  o.type="triangle";
  o.frequency.value=f;
  const amp=Math.max(0.02, Math.min(0.35, 0.22*impact));
  g.gain.setValueAtTime(0.0001,now);
  g.gain.exponentialRampToValueAtTime(amp, now+0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, now+0.24);
  o.connect(g); g.connect(master);
  o.start(now); o.stop(now+0.26);
}

// HELPERS
function rand(a,b){return a+Math.random()*(b-a)}
function clamp(x,a,b){return Math.max(a, Math.min(b, x));}

// ---- Pastel overlay (changes on every collision) ----
const overlay = {
  // current RGB
  r: 40, g: 50, b: 65,
  // target RGB (what we ease toward each frame)
  tr: 40, tg: 50, tb: 65,
  // BASE RGB set by hue slider (what we drift back to after flashes)
  br: 40, bg: 50, bb: 65,
  a: 0.88,      // opacity (slider-controlled)
  lerp: 0.10,   // transition speed
  // how strongly we drift back to base each frame (0..1)
  basePull: 0.02
};

function hslToRgb(h, s, l){
  h = ((h%360)+360)%360;
  const c = (1 - Math.abs(2*l - 1)) * s;
  const x = c * (1 - Math.abs(((h/60) % 2) - 1));
  const m = l - c/2;
  let r1=0,g1=0,b1=0;
  if(h < 60){ r1=c; g1=x; b1=0; }
  else if(h < 120){ r1=x; g1=c; b1=0; }
  else if(h < 180){ r1=0; g1=c; b1=x; }
  else if(h < 240){ r1=0; g1=x; b1=c; }
  else if(h < 300){ r1=x; g1=0; b1=c; }
  else { r1=c; g1=0; b1=x; }
  return {
    r: Math.round((r1 + m) * 255),
    g: Math.round((g1 + m) * 255),
    b: Math.round((b1 + m) * 255)
  };
}

function pickVividNearHue(baseHue){
  // choose a bright, saturated color near the chosen hue
  const h = (baseHue + (Math.random()*70 - 35) + 360) % 360;  // +/- 35°
  const s = 0.78 + Math.random() * 0.18;  // high saturation
  const l = 0.52 + Math.random() * 0.18;  // vivid lightness
  return hslToRgb(h, s, l);
}

function setOverlayBaseFromHue(){
  const baseHue = parseFloat(hueEl.value);
  // base is softer than flash but still colorful
  const base = hslToRgb(baseHue, 0.55, 0.62);
  overlay.br = base.r; overlay.bg = base.g; overlay.bb = base.b;

  // if no recent flash, gently steer target toward base too
  overlay.tr = overlay.br; overlay.tg = overlay.bg; overlay.tb = overlay.bb;
}

function bumpOverlayColor(){
  // flash color near the base hue
  const baseHue = parseFloat(hueEl.value);
  const c = pickVividNearHue(baseHue);
  overlay.tr = c.r; overlay.tg = c.g; overlay.tb = c.b;
}

const MAX_CIRCLES=220;

function radiusFromN(n){
  return clamp((14 + Math.sqrt(n)*0.85)*dpr, 10*dpr, 60*dpr);
}
function pickN(){ return Math.floor(rand(10, 320)); }

function makeCircle(n=null){
  const nn = (n==null)? pickN() : n;
  const r = radiusFromN(nn);
  const speed=220*dpr;
  const ang=rand(0,Math.PI*2);
  return{
    x:rand(r,W-r),
    y:rand(r,H-r),
    vx:Math.cos(ang)*speed*rand(0.7,1.2),
    vy:Math.sin(ang)*speed*rand(0.7,1.2),
    r:r,
    m:r*r,
    n:nn,
    lastMath:-1e9,
    flash:0
  };
}
function updatePhysical(c){
  c.r=radiusFromN(c.n);
  c.m=c.r*c.r;
  c.x=clamp(c.x,c.r,W-c.r);
  c.y=clamp(c.y,c.r,H-c.r);
}

// Non-overlapping-ish spawn with attempts
let circles=[];
function spawnNew(n=null){
  if(circles.length>=MAX_CIRCLES) return false;
  const tries=120;
  for(let k=0;k<tries;k++){
    const c=makeCircle(n);
    let ok=true;
    for(const o of circles){
      const dx=c.x-o.x, dy=c.y-o.y;
      const rr=c.r+o.r;
      if(dx*dx+dy*dy < rr*rr*1.02){ ok=false; break; }
    }
    if(ok){ circles.push(c); return true; }
  }
  circles.push(makeCircle(n));
  return true;
}

function init(){
  circles=[];
  const target=parseInt(document.getElementById("minCircles").value,10);
  for(let i=0;i<target;i++) spawnNew();
}
document.getElementById("reset").onclick=init;

let paused=false;
document.getElementById("pause").onclick=()=>{
  paused=!paused;
  document.getElementById("pause").textContent=paused?"Play":"Pause";
};

// UI sliders
const minEl=document.getElementById("minCircles");
const minOut=document.getElementById("minOut");
const seedEl=document.getElementById("seedRate");
const seedOut=document.getElementById("seedOut");
const opacEl=document.getElementById("opac");
const opacOut=document.getElementById("opacOut");
const hueEl=document.getElementById("hue");
const hueOut=document.getElementById("hueOut");
function updUI(){ minOut.textContent=minEl.value; seedOut.textContent=seedEl.value; opacOut.textContent=parseFloat(opacEl.value).toFixed(2); hueOut.textContent=hueEl.value; }
minEl.addEventListener("input",()=>{updUI();});
seedEl.addEventListener("input",()=>{updUI();});
opacEl.addEventListener("input",()=>{ overlay.a = parseFloat(opacEl.value); updUI(); });
hueEl.addEventListener("input",()=>{ setOverlayBaseFromHue(); updUI(); });
updUI();
init();

// initialize overlay opacity from slider
overlay.a = parseFloat(opacEl.value);

// DOUBLE-TAP anywhere (outside sliders/buttons) to show/hide the panel.
// Prevents accidental toggle while adjusting sliders.
const panelEl = document.getElementById("panel");
let _lastTapTime = 0;
const DOUBLE_TAP_DELAY = 320; // milliseconds

function isControlTarget(t){
  if(!t) return false;
  return !!(t.closest && t.closest("button, input, select, textarea"));
}

function handleTap(e){
  if(isControlTarget(e.target)) return;

  const now = Date.now();
  if(now - _lastTapTime < DOUBLE_TAP_DELAY){
    panelEl.style.display =
      (panelEl.style.display === "none") ? "block" : "none";
    _lastTapTime = 0;
  } else {
    _lastTapTime = now;
  }
}

if (window.PointerEvent) {
  window.addEventListener("pointerdown", handleTap, { passive: true });
} else {
  window.addEventListener("touchstart", handleTap, { passive: true });
}

function togglePanel(e){
  const now = Date.now();
  if (now - _lastToggleMS < 350) return; // prevent double-toggle
  _lastToggleMS = now;

  if (shouldIgnoreToggleTarget(e.target)) return;

  panelEl.style.display = (panelEl.style.display === "none") ? "block" : "none";
}

// Prefer pointer events when available; otherwise touchstart.
if (window.PointerEvent) {
  window.addEventListener("pointerdown", togglePanel, { passive: true });
} else {
  window.addEventListener("touchstart", togglePanel, { passive: true });
}


function spawnRemainder(value,x,y,nx,ny,vx,vy){
  if(value<=1||circles.length>=MAX_CIRCLES) return;
  const ok = spawnNew(value);
  if(!ok) return;
  const c=circles[circles.length-1];
  const sep=c.r+8*dpr;
  c.x=clamp(x+nx*sep,c.r,W-c.r);
  c.y=clamp(y+ny*sep,c.r,H-c.r);
  c.vx=vx*0.2+nx*150*dpr;
  c.vy=vy*0.2+ny*150*dpr;
}

// Division rule + cooldown
function applyDivision(a,b,nx,ny,nowS){
  const cooldown=0.18;
  if(nowS-a.lastMath<cooldown||nowS-b.lastMath<cooldown) return;

  let L=a,S=b;
  if(b.n>a.n){L=b;S=a;}
  if(L.n===S.n) return;

  const big=L.n, small=S.n;
  const q=Math.floor(big/small);
  const r=big%small;

  L.n=q;
  if(L.n<=1){
    const idx=circles.indexOf(L);
    if(idx!==-1) circles.splice(idx,1);
  }else{
    updatePhysical(L);
  }

  if(r>1){
    let sx=nx,sy=ny;
    if(L===a){sx=-nx;sy=-ny;}
    spawnRemainder(r,S.x,S.y,sx,sy,S.vx,S.vy);
  }

  a.lastMath=nowS; b.lastMath=nowS;
}

// Elastic collision + overlap correction
function resolve(a,b,nowS){
  const dx=b.x-a.x, dy=b.y-a.y;
  const dist2=dx*dx+dy*dy;
  const minDist=a.r+b.r;
  if(dist2<=0||dist2>=minDist*minDist) return;

  const dist=Math.sqrt(dist2);
  const nx=dx/dist, ny=dy/dist;

  const overlap=minDist-dist;
  const total=a.m+b.m;
  a.x-=nx*(overlap*(b.m/total));
  a.y-=ny*(overlap*(b.m/total));
  b.x+=nx*(overlap*(a.m/total));
  b.y+=ny*(overlap*(a.m/total));

  const rvx=b.vx-a.vx, rvy=b.vy-a.vy;
  const velAlong=rvx*nx+rvy*ny;
  if(velAlong>0) return;

  const j=-(1+1.0)*velAlong/(1/a.m+1/b.m);
  const impX=j*nx, impY=j*ny;
  a.vx-=impX/a.m; a.vy-=impY/a.m;
  b.vx+=impX/b.m; b.vy+=impY/b.m;

  // Growth +ADD to BOTH (slider-controlled)
  const add = 1;
  a.n += add;
  b.n += add;
  updatePhysical(a); updatePhysical(b);

  const impact=Math.min(1,Math.abs(velAlong)/(280*dpr));
  playHitSound(a,b,impact);
  bumpOverlayColor();

  applyDivision(a,b,nx,ny,nowS);
}

let lastT=performance.now();
let seedAcc=0;

function loop(t){
  const dt=Math.min(0.03,(t-lastT)/1000);
  lastT=t;
  const nowS=t/1000;

  if(!paused){
    const steps=Math.max(1,Math.ceil(dt/0.01));
    const h=dt/steps;
    for(let s=0;s<steps;s++){
      // auto-reseed toward minimum count
      const minC = parseInt(minEl.value,10);
      const rate = parseFloat(seedEl.value);
      const deficit = Math.max(0, minC - circles.length);
      seedAcc += h * deficit * rate;
      while(seedAcc >= 1.0){
        seedAcc -= 1.0;
        spawnNew();
      }

      for(const c of circles){
        c.x+=c.vx*h;
        c.y+=c.vy*h;

        if(c.x-c.r<0){c.x=c.r;c.vx=Math.abs(c.vx);}
        if(c.x+c.r>W){c.x=W-c.r;c.vx=-Math.abs(c.vx);}
        if(c.y-c.r<0){c.y=c.r;c.vy=Math.abs(c.vy);}
        if(c.y+c.r>H){c.y=H-c.r;c.vy=-Math.abs(c.vy);}
      }

      for(let i=0;i<circles.length;i++){
        for(let j=i+1;j<circles.length;j++){
          resolve(circles[i],circles[j],nowS);
        }
      }
    }
  }

  // draw
  ctx.fillStyle="#0b0f14";
  ctx.fillRect(0,0,W,H);
  // smooth transition of overlay color
  // drift target back toward the base color (set by hue slider)
  overlay.tr += (overlay.br - overlay.tr) * overlay.basePull;
  overlay.tg += (overlay.bg - overlay.tg) * overlay.basePull;
  overlay.tb += (overlay.bb - overlay.tb) * overlay.basePull;

  // ease current color toward target
  overlay.r += (overlay.tr - overlay.r) * overlay.lerp;
  overlay.g += (overlay.tg - overlay.g) * overlay.lerp;
  overlay.b += (overlay.tb - overlay.b) * overlay.lerp;

  ctx.textAlign="center";
  ctx.textBaseline="middle";

  for(const c of circles){
    ctx.beginPath();
    ctx.arc(c.x,c.y,c.r,0,Math.PI*2);
    ctx.fillStyle=`hsl(${c.n%360} 80% 60%)`;
    ctx.fill();
    ctx.fillStyle="#fff";
    ctx.font=`${Math.max(12*dpr,c.r*0.7)}px sans-serif`;
    ctx.fillText(c.n,c.x,c.y);
  }

  // semi-opaque pastel overlay across entire field (changes on collisions)
  ctx.fillStyle = `rgba(${Math.round(overlay.r)},${Math.round(overlay.g)},${Math.round(overlay.b)},${overlay.a})`;
  ctx.fillRect(0,0,W,H);

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

const startBtn = document.getElementById("startAudio");
const styleSel = document.getElementById("soundStyle");
try{
  const savedStyle = localStorage.getItem(STORAGE_SOUND_STYLE);
  if(savedStyle){ soundStyle = savedStyle; if(styleSel) styleSel.value = savedStyle; }
}catch(e){}
if(styleSel){
  styleSel.addEventListener("change", ()=>{
    soundStyle = styleSel.value;
    try{ localStorage.setItem(STORAGE_SOUND_STYLE, soundStyle); }catch(e){}
  });
}
if(startBtn){
  startBtn.onclick = async ()=>{
    ensureAudio();
    if(!audioOn){
      if(ac && ac.state==="suspended") await ac.resume();
      audioOn = true;
      startBtn.textContent = "Sound Off";
    }else{
      if(ac && ac.state==="running") await ac.suspend();
      audioOn = false;
      startBtn.textContent = "Sound On";
    }
  };
}

const testBtn = document.getElementById("testSound");
if(testBtn){
  testBtn.onclick = async ()=>{
    ensureAudio();
    if(ac && ac.state==="suspended") await ac.resume();
    audioOn = true;
    if(startBtn) startBtn.textContent = "Sound Off";
    // play an obvious test sound for the chosen style
    playHitSound(123, 77, 1.0);
  };
}
