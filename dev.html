<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>HoldStack Circles (Always Outside, One Color)</title>
  <style>
    html, body{
      margin:0; padding:0; height:100%;
      overflow:hidden;
      background:#0b0f14;
      touch-action:none;
      -webkit-user-select:none; user-select:none;
      font-family:-apple-system, system-ui, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    }
    #c{display:block; width:100vw; height:100vh;}
    #ui{
      position:fixed; left:12px; right:12px; top:12px; z-index:10;
      display:flex; gap:10px; align-items:center; flex-wrap:wrap;
      padding:10px 12px; border-radius:12px;
      background:rgba(20,28,38,0.72);
      backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
      color:#e9eef6; box-sizing:border-box;
    }
    #ui button{
      border:0; border-radius:10px; padding:10px 12px;
      font-size:14px; font-weight:600; color:#e9eef6;
      background:rgba(255,255,255,0.10); white-space:nowrap;
    }
    #ui button:active{transform:scale(0.98);}
    #ui label{font-size:13px; opacity:0.9;}
    #ui input[type="range"]{width:140px;}
    #stats{margin-left:auto; font-size:12px; opacity:0.9;}

    #hint{
      position:fixed; left:12px; bottom:12px; z-index:10;
      padding:10px 12px; border-radius:12px;
      background:rgba(20,28,38,0.55);
      backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
      color:#e9eef6; font-size:12px; line-height:1.25;
      max-width:82vw; box-sizing:border-box;
    }
    .mono{font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;}
  </style>
</head>
<body>
<canvas id="c"></canvas>

<div id="ui">
  <button id="next">Next</button>
  <button id="reset">Reset</button>

  <label>Padding</label>
  <input id="pad" type="range" min="0" max="30" value="6" />
  <span id="padVal">6</span>

  <label>Min r</label>
  <input id="minr" type="range" min="2" max="60" value="10" />
  <span id="minrVal">10</span>

  <div id="stats">N=0</div>
</div>

<div id="hint">
  New circle is forced to be <b>outside all existing circles</b> (no overlap).<br/>
  For a random center, we compute: <span class="mono">r = min_i (dist(center, ci) - ri) - padding</span>.<br/>
  If <span class="mono">r</span> is too small, we retry with a new random center.
</div>

<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d', { alpha:false });

  // Single color
  const C = { fill:"rgba(70,130,255,0.22)", stroke:"rgba(70,130,255,0.85)" };

  let holdStack = [];

  const nextBtn = document.getElementById('next');
  const resetBtn = document.getElementById('reset');
  const padEl = document.getElementById('pad');
  const padVal = document.getElementById('padVal');
  const minrEl = document.getElementById('minr');
  const minrVal = document.getElementById('minrVal');
  const statsEl = document.getElementById('stats');

  function rand(min, max){ return min + Math.random()*(max-min); }
  function clamp(v,a,b){ return Math.max(a, Math.min(b,v)); }

  function resize(){
    const dpr = Math.max(1, Math.min(3, window.devicePixelRatio || 1));
    canvas.width = Math.floor(window.innerWidth * dpr);
    canvas.height = Math.floor(window.innerHeight * dpr);
    canvas.style.width = window.innerWidth + "px";
    canvas.style.height = window.innerHeight + "px";
    ctx.setTransform(dpr,0,0,dpr,0,0);
    clearCanvas();
    redrawAll();
  }
  window.addEventListener('resize', resize, {passive:true});

  function clearCanvas(){
    ctx.fillStyle="#0b0f14";
    ctx.fillRect(0,0,window.innerWidth, window.innerHeight);
  }

  function drawCircle(c){
    ctx.beginPath();
    ctx.arc(c.x,c.y,c.r,0,Math.PI*2);
    ctx.closePath();
    ctx.fillStyle = C.fill;
    ctx.fill();
    ctx.lineWidth = 1.25;
    ctx.strokeStyle = C.stroke;
    ctx.stroke();
  }

  function redrawAll(){
    for (const c of holdStack) drawCircle(c);
  }

  function init(){
    holdStack = [];
    clearCanvas();

    // Start with one random circle
    const w = window.innerWidth, h = window.innerHeight;
    const r0 = rand(Math.min(w,h)*0.08, Math.min(w,h)*0.18);
    const c0 = {
      x: rand(r0, w-r0),
      y: rand(r0, h-r0),
      r: r0
    };
    holdStack.push(c0);
    drawCircle(c0);
    statsEl.textContent = `N=${holdStack.length}`;
  }

  // Compute maximum allowed radius at (x,y) so circle stays outside all existing circles.
  function allowedRadiusAt(x, y, padding){
    let r = Infinity;
    for (const c of holdStack){
      const d = Math.hypot(x - c.x, y - c.y);
      r = Math.min(r, d - c.r);
    }
    return r - padding; // enforce a gap
  }

  function stepOnce(){
    const w = window.innerWidth, h = window.innerHeight;
    const padding = parseFloat(padEl.value) || 0;
    const rMin = parseFloat(minrEl.value) || 2;
    const rMax = Math.min(w,h) * 0.45;

    // Try a bunch of random centers until we find one that yields a decent radius
    const MAX_TRIES = 800;
    for (let t=0; t<MAX_TRIES; t++){
      // pick a center with generous margin so we can keep it on-screen after radius is known
      const x = rand(0, w);
      const y = rand(0, h);

      let r = allowedRadiusAt(x, y, padding);
      if (!isFinite(r)) continue;
      r = clamp(r, 0, rMax);

      if (r < rMin) continue;

      // keep on-screen by clamping center after radius known
      const xc = clamp(x, r, w - r);
      const yc = clamp(y, r, h - r);

      // Re-check after clamping (center changed slightly)
      r = allowedRadiusAt(xc, yc, padding);
      r = clamp(r, 0, rMax);
      if (r < rMin) continue;

      const cNew = { x: xc, y: yc, r: r };
      holdStack.push(cNew);
      drawCircle(cNew);
      statsEl.textContent = `N=${holdStack.length}`;
      return;
    }

    // If we failed, do nothing (means too crowded)
    // You can hit Reset to start over.
  }

  nextBtn.addEventListener('click', () => stepOnce());
  resetBtn.addEventListener('click', () => init());

  padEl.addEventListener('input', () => padVal.textContent = `${padEl.value}`);
  minrEl.addEventListener('input', () => minrVal.textContent = `${minrEl.value}`);

  document.addEventListener('touchmove', (e)=>e.preventDefault(), {passive:false});

  resize();
  padVal.textContent = `${padEl.value}`;
  minrVal.textContent = `${minrEl.value}`;
  init();
})();
</script>
</body>
</html>
