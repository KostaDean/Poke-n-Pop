<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Screamsaver Bounce + Sound</title>
<style>
html,body{margin:0;height:100%;background:#000;overflow:hidden;font-family:system-ui}
canvas{display:block;width:100vw;height:100vh;touch-action:none}
#panel{
 position:fixed;top:14px;left:14px;right:14px;
 background:rgba(20,20,22,.9);color:#fff;border-radius:16px;padding:12px;
 box-shadow:0 20px 60px rgba(0,0,0,.55);
}
button{font-size:18px;border-radius:14px;padding:8px 14px;margin:4px;
 border:1px solid rgba(255,255,255,.35);
 background:rgba(255,255,255,.10);color:#fff}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="panel">
<button id="reset">Reset</button>
<button id="sound">Sound On</button>
<p>Single tap = POP<br>Double tap = toggle panel</p>
</div>

<script>
const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");
const panel=document.getElementById("panel");

let dpr=window.devicePixelRatio||1;
function resize(){
 canvas.width=innerWidth*dpr;
 canvas.height=innerHeight*dpr;
 canvas.style.width=innerWidth+"px";
 canvas.style.height=innerHeight+"px";
}
resize();
addEventListener("resize",resize);

// audio
let audioOn=true;
let ac=null;
function ensureAudio(){
 if(!audioOn) return;
 if(!ac) ac=new (window.AudioContext||window.webkitAudioContext)();
 if(ac.state==="suspended") ac.resume();
}
function blip(freq=220,vol=0.3,dur=0.08){
 if(!audioOn) return;
 ensureAudio();
 const o=ac.createOscillator();
 const g=ac.createGain();
 o.frequency.value=freq;
 o.type="sine";
 g.gain.value=vol;
 o.connect(g);g.connect(ac.destination);
 o.start();
 o.stop(ac.currentTime+dur);
}

let circles=[];
function seed(n=18){
 circles=[];
 for(let i=0;i<n;i++){
  circles.push({
   x:Math.random()*canvas.width,
   y:Math.random()*canvas.height,
   r:20*dpr+Math.random()*25*dpr,
   vx:(Math.random()-0.5)*2*dpr,
   vy:(Math.random()-0.5)*2*dpr
  });
 }
}
seed();

function collide(a,b){
 const dx=b.x-a.x;
 const dy=b.y-a.y;
 const dist=Math.hypot(dx,dy);
 if(dist<a.r+b.r){
  const angle=Math.atan2(dy,dx);
  const overlap=a.r+b.r-dist;
  const ax=Math.cos(angle)*overlap/2;
  const ay=Math.sin(angle)*overlap/2;
  a.x-=ax; a.y-=ay;
  b.x+=ax; b.y+=ay;
  const tmpVx=a.vx; const tmpVy=a.vy;
  a.vx=b.vx; a.vy=b.vy;
  b.vx=tmpVx; b.vy=tmpVy;
  blip(180+Math.random()*200,0.15,0.05);
 }
}

let flash=0,fx=0,fy=0;
function drawFlash(){
 if(flash<=0) return;
 ctx.save();
 ctx.globalCompositeOperation="screen";
 const g=ctx.createRadialGradient(fx,fy,0,fx,fy,150*dpr);
 g.addColorStop(0,"rgba(255,255,255,"+flash+")");
 g.addColorStop(1,"rgba(255,255,255,0)");
 ctx.fillStyle=g;
 ctx.beginPath();
 ctx.arc(fx,fy,150*dpr,0,Math.PI*2);
 ctx.fill();
 ctx.restore();
 flash-=0.05;
}

function loop(){
 ctx.fillStyle="#000";
 ctx.fillRect(0,0,canvas.width,canvas.height);

 for(let c of circles){
  c.x+=c.vx;
  c.y+=c.vy;
  if(c.x-c.r<0||c.x+c.r>canvas.width) c.vx*=-1;
  if(c.y-c.r<0||c.y+c.r>canvas.height) c.vy*=-1;
 }

 for(let i=0;i<circles.length;i++){
  for(let j=i+1;j<circles.length;j++){
   collide(circles[i],circles[j]);
  }
 }

 ctx.fillStyle="#d85a4a";
 for(let c of circles){
  ctx.beginPath();
  ctx.arc(c.x,c.y,c.r,0,Math.PI*2);
  ctx.fill();
 }

 drawFlash();
 requestAnimationFrame(loop);
}
loop();

let lastTap=0;
canvas.addEventListener("pointerdown",e=>{
 const now=Date.now();
 if(now-lastTap<300){
  panel.style.display=panel.style.display==="none"?"block":"none";
  lastTap=0;
  return;
 }
 lastTap=now;

 const rect=canvas.getBoundingClientRect();
 const x=(e.clientX-rect.left)*dpr;
 const y=(e.clientY-rect.top)*dpr;

 for(let i=circles.length-1;i>=0;i--){
  const c=circles[i];
  const dx=x-c.x,dy=y-c.y;
  if(dx*dx+dy*dy<c.r*c.r){
   circles.splice(i,1);
   fx=c.x;fy=c.y;flash=1;
   blip(80,0.6,0.15);
   break;
  }
 }
},{passive:false});

document.getElementById("reset").onclick=()=>seed();
document.getElementById("sound").onclick=()=>{
 audioOn=!audioOn;
 document.getElementById("sound").textContent=audioOn?"Sound On":"Sound Off";
 if(audioOn) ensureAudio();
};
</script>
</body>
</html>
