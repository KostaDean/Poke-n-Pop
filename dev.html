<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
<title>Piglet Escape Game</title>
<style>
  :root{
    --bg:#143d63;
    --pink:#e79cab;
    --ui:#081c2b;
    --ui2:#12314a;
    --text:#eef6ff;
  }
  html,body{
    margin:0; padding:0; width:100%; height:100%;
    background:var(--bg); overflow:hidden; touch-action:manipulation;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  }
  #wrap{position:fixed; inset:0; background:var(--bg);}
  canvas{position:absolute; inset:0; width:100%; height:100%; display:block;}
  #panelBtn{
    position:absolute; top:max(10px, env(safe-area-inset-top)); right:10px;
    z-index:4; font-size:13px; color:white; background:rgba(4,15,26,.78);
    border:1px solid rgba(255,255,255,.12); border-radius:8px; padding:7px 10px;
    user-select:none; pointer-events:none; opacity:.95;
  }
  #panel{
    position:absolute; top:48px; right:10px; z-index:5; display:none;
    background:rgba(4,15,26,.9); color:var(--text);
    border:1px solid rgba(255,255,255,.12); border-radius:12px; padding:10px 12px;
    min-width:180px; box-shadow:0 12px 30px rgba(0,0,0,.25);
    font-size:14px;
  }
  #score{
    position:absolute; inset:0; display:none; align-items:center; justify-content:center;
    z-index:6; background:rgba(5,16,24,.48); color:white; text-align:center;
  }
  #scoreCard{
    background:rgba(6,18,29,.92); border:1px solid rgba(255,255,255,.12);
    border-radius:16px; padding:22px 24px; min-width:220px; box-shadow:0 20px 40px rgba(0,0,0,.35);
  }
  #scoreTime{font-size:34px; font-weight:700; margin:8px 0 12px;}
  #scoreSmall{font-size:14px; opacity:.82}
  #playBtn{
    margin-top:14px; padding:10px 14px; border-radius:10px; border:0; cursor:pointer;
    background:#2a83ff; color:white; font-size:15px;
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>
  <div id="panelBtn">Control Panel</div>
  <div id="panel">
    <div><strong>Double-tap empty space</strong></div>
    <div style="margin-top:6px; opacity:.85;">to show/hide this panel.</div>
  </div>
  <div id="score">
    <div id="scoreCard">
      <div id="scoreSmall">Elapsed time</div>
      <div id="scoreTime">0.00 s</div>
      <div id="scoreSmall">from first pop to last circle finished</div>
      <button id="playBtn">Play Again</button>
    </div>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const panel = document.getElementById('panel');
  const score = document.getElementById('score');
  const scoreTime = document.getElementById('scoreTime');
  const playBtn = document.getElementById('playBtn');

  const escapeSprite = new Image();
  escapeSprite.src = "assets/sfx/escape.png";
  const lookSprite = new Image();
  lookSprite.src = "assets/sfx/look_back.png";

  const oinkA = new Audio("assets/sfx/pig_oink.mp3");
  const oinkB = new Audio("assets/sfx/pig_oink1.mp3");
  const OINKS = [oinkA, oinkB];

  const FRAME_W = 512, FRAME_H = 512;
  const BG = '#143d63';
  const PINK = '#e79cab';
  const N = 10;
  const SAFE_DIST = 140;
  const CIRCLE_R = 34;

  let dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
  let W = 0, H = 0;
  let pigs = [];
  let gameEnded = false;
  let firstPopAt = null;
  let finalScoreMs = 0;

  function resize(){
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = Math.floor(W * dpr);
    canvas.height = Math.floor(H * dpr);
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  resize();
  addEventListener('resize', resize);

  function rand(a,b){ return a + Math.random()*(b-a); }
  function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }
  function dist(ax,ay,bx,by){ return Math.hypot(ax-bx, ay-by); }

  function playOink(){
    const a = OINKS[(Math.random()*OINKS.length)|0].cloneNode();
    a.volume = 0.85;
    a.play().catch(()=>{});
  }

  function makePig() {
    const margin = 60;
    const x = rand(margin, W-margin);
    const y = rand(margin+30, H-margin-40);
    const ang = rand(0, Math.PI*2);
    const speed = rand(55, 95);
    return {
      x, y, r: CIRCLE_R,
      vx: Math.cos(ang)*speed,
      vy: Math.sin(ang)*speed,
      state: 'circle', // circle, pop, react, dust, look, gone
      t: 0,
      frameTime: 0,
      frame: 0,
      dust: [],
      targetX: x,
      targetY: y,
      startX: x,
      startY: y,
      isLastSequence: false,
      wobbleSeed: rand(0,1000)
    };
  }

  function resetGame(){
    pigs = Array.from({length:N}, makePig);
    gameEnded = false;
    firstPopAt = null;
    finalScoreMs = 0;
    score.style.display = 'none';
  }
  resetGame();

  function livingCount(){
    return pigs.filter(p => p.state !== 'gone' && p.state !== 'pop').length;
  }

  function showScore(){
    gameEnded = true;
    scoreTime.textContent = (finalScoreMs/1000).toFixed(2) + ' s';
    score.style.display = 'flex';
  }
  playBtn.addEventListener('click', resetGame);

  function bounceCircle(p, dt){
    p.x += p.vx * dt;
    p.y += p.vy * dt;

    if (p.x < p.r){ p.x = p.r; p.vx = Math.abs(p.vx); }
    if (p.x > W-p.r){ p.x = W-p.r; p.vx = -Math.abs(p.vx); }
    if (p.y < p.r){ p.y = p.r; p.vy = Math.abs(p.vy); }
    if (p.y > H-p.r){ p.y = H-p.r; p.vy = -Math.abs(p.vy); }
  }

  function createPoof(p){
    for(let i=0;i<13;i++){
      const a = rand(0, Math.PI*2);
      const sp = rand(18, 55);
      p.dust.push({
        x:p.x, y:p.y,
        vx:Math.cos(a)*sp,
        vy:Math.sin(a)*sp,
        life:rand(0.26,0.42),
        maxLife:0
      });
      p.dust[p.dust.length-1].maxLife = p.dust[p.dust.length-1].life;
    }
  }

  function startEscapeSequence(p, tapX, tapY, forceFinalLook=false){
    p.state = 'react';
    p.t = forceFinalLook ? 0.42 : 0.34;
    p.frame = 0;
    p.frameTime = 0;
    p.dust.length = 0;
    p.startX = p.x;
    p.startY = p.y;
    p.isLastSequence = forceFinalLook;

    let dx = p.x - tapX;
    let dy = p.y - tapY;
    let len = Math.hypot(dx, dy);
    if (!len || len < 0.001){
      const a = rand(0, Math.PI*2);
      dx = Math.cos(a); dy = Math.sin(a); len = 1;
    }
    dx /= len; dy /= len;

    let tx = p.x + dx * SAFE_DIST;
    let ty = p.y + dy * SAFE_DIST;

    tx = clamp(tx, p.r+16, W-p.r-16);
    ty = clamp(ty, p.r+16, H-p.r-16);

    p.targetX = tx;
    p.targetY = ty;
    playOink();
  }

  function pointOnCircle(x,y){
    for(let i=pigs.length-1;i>=0;i--){
      const p = pigs[i];
      if (p.state !== 'circle') continue;
      if (dist(x,y,p.x,p.y) <= p.r) return p;
    }
    return null;
  }

  // Real double-tap on EMPTY background only
  let lastTapTime = 0;
  let lastTapX = 0, lastTapY = 0;

  canvas.addEventListener('pointerup', (e) => {
    if (gameEnded) return;
    e.preventDefault();

    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    const hit = pointOnCircle(x,y);

    const now = performance.now();
    const closeInTime = (now - lastTapTime) < 300;
    const closeInSpace = dist(x,y,lastTapX,lastTapY) < 28;

    if (!hit && closeInTime && closeInSpace) {
      panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
      lastTapTime = 0;
      return;
    }

    lastTapTime = now;
    lastTapX = x; lastTapY = y;

    if (!hit) return;

    const d = dist(x,y,hit.x,hit.y);

    if (d < hit.r * 0.5) {
      if (firstPopAt == null) firstPopAt = performance.now();
      hit.state = 'pop';
      hit.t = 0.20;
      if (livingCount() === 1){
        finalScoreMs = performance.now() - firstPopAt;
        setTimeout(showScore, 260);
      }
      return;
    }

    if (livingCount() === 1) {
      if (firstPopAt == null) firstPopAt = performance.now();
      startEscapeSequence(hit, x, y, true);
    } else {
      startEscapeSequence(hit, x, y, false);
    }
  });

  function updateDust(p, dt){
    for (const d of p.dust){
      d.life -= dt;
      d.x += d.vx * dt;
      d.y += d.vy * dt;
    }
    p.dust = p.dust.filter(d => d.life > 0);
  }

  function tick(p, dt){
    if (p.state === 'circle') {
      bounceCircle(p, dt);
      return;
    }

    if (p.state === 'pop') {
      p.t -= dt;
      if (p.t <= 0) p.state = 'gone';
      return;
    }

    if (p.state === 'react') {
      p.t -= dt;
      p.frameTime += dt;
      if (p.frameTime > 0.09){
        p.frameTime = 0;
        p.frame = (p.frame + 1) % 3;
      }
      if (p.t <= 0){
        createPoof(p);
        p.state = 'dust';
        p.t = 0;
      }
      updateDust(p, dt);
      return;
    }

    if (p.state === 'dust') {
      p.t += dt / (p.isLastSequence ? 0.65 : 0.52);
      const t = Math.min(1, p.t);

      // after local reaction is finished, draw a moving dust marker along the path
      const tx = p.startX + (p.targetX - p.startX) * t;
      const ty = p.startY + (p.targetY - p.startY) * t;
      p.dust.push({
        x:tx, y:ty,
        vx:0, vy:0,
        life:0.34, maxLife:0.34
      });

      if (t >= 1){
        p.x = p.targetX;
        p.y = p.targetY;
        p.state = 'look';
        p.t = p.isLastSequence ? 1.0 : 0.55;
        p.frameTime = 0;
        p.frame = 0;
      }
      updateDust(p, dt);
      return;
    }

    if (p.state === 'look') {
      p.t -= dt;
      p.frameTime += dt;
      if (p.frameTime > 0.12){
        p.frameTime = 0;
        p.frame = (p.frame + 1) % 2;
      }

      if (p.t <= 0){
        if (p.isLastSequence){
          p.state = 'gone';
          finalScoreMs = performance.now() - firstPopAt;
          setTimeout(showScore, 120);
        } else {
          p.state = 'circle';
          const ang = rand(0, Math.PI*2);
          const speed = rand(55,95);
          p.vx = Math.cos(ang)*speed;
          p.vy = Math.sin(ang)*speed;
        }
      }
      updateDust(p, dt);
      return;
    }
  }

  function drawDust(p){
    for(const d of p.dust){
      const a = Math.max(0, d.life / d.maxLife);
      ctx.globalAlpha = a * 0.82;
      ctx.beginPath();
      ctx.arc(d.x, d.y, 6 + (1-a)*7, 0, Math.PI*2);
      ctx.fillStyle = '#d7ceb0';
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function drawCircle(p){
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fillStyle = PINK;
    ctx.fill();
  }

  function drawSprite(img, frameCount, frameIndex, x, y, size, wobble=0){
    if (!img.complete || !img.naturalWidth) return;
    ctx.save();
    ctx.translate(x, y);
    if (wobble) ctx.rotate(wobble);
    ctx.drawImage(
      img,
      frameIndex * FRAME_W, 0, FRAME_W, FRAME_H,
      -size/2, -size/2, size, size
    );
    ctx.restore();
  }

  let prev = performance.now();
  function loop(now){
    const dt = Math.min(0.033, (now - prev) / 1000);
    prev = now;

    ctx.clearRect(0,0,W,H);
    ctx.fillStyle = BG;
    ctx.fillRect(0,0,W,H);

    for (const p of pigs) tick(p, dt);

    for (const p of pigs) {
      if (p.state === 'gone') continue;
      drawDust(p);

      if (p.state === 'circle' || p.state === 'pop') {
        if (p.state === 'pop') {
          const k = Math.max(0, p.t / 0.20);
          ctx.globalAlpha = k;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r * (1 + (1-k)*0.6), 0, Math.PI*2);
          ctx.fillStyle = PINK;
          ctx.fill();
          ctx.globalAlpha = 1;
        } else {
          drawCircle(p);
        }
      } else if (p.state === 'react') {
        const wobble = Math.sin((0.34 - p.t) * 36 + p.wobbleSeed) * 0.12;
        drawSprite(escapeSprite, 3, p.frame, p.x, p.y, 84, wobble);
      } else if (p.state === 'look') {
        drawSprite(lookSprite, 2, p.frame, p.x, p.y, 84, 0);
      }
    }

    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
