<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" name="viewport"/>
<title>Spatial Memory Trainer</title>
<style>

  :root{
    --bg:#0b1020;
    --panel:#111a33;
    --arena:#101a35;
    --text:#eef;
    --muted:#b7c0ee;

    --flash1:#1f2f66;
    --flash2:#0d1633;

    /* chosen by dropdown */
    --bgA:#1a2a5a;
    --bgB:#0b1020;

    --gameA: rgba(16,26,53,0.78);
    --gameB: rgba(16,26,53,0.78);
  }

  html, body{ height:100%; width:100%; overflow:hidden; }
  body{
    margin:0;
    background: radial-gradient(1000px 700px at 50% 10%, var(--bgA), var(--bgB));
    color:var(--text);
    font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    display:grid;
    grid-template-rows:auto 1fr;
    height:100dvh;
    --vvh: 100vh;
    --vb: 0px;
    --headerH: 0px;
    position:fixed;
    inset:0;
    overflow:hidden;
  }

  header{
    padding:10px 14px;
    position:relative;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background: rgba(17,26,51,0.88);
    border-bottom: 1px solid rgba(255,255,255,0.10);
    gap:12px;
    flex-wrap:wrap;
  }

  #status{
    font-size:14px;
    color:var(--muted);
    padding:0 4px;
    text-align:left;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  #level { font-size:14px; }
  #controls{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:nowrap;
    justify-content:flex-start;
  }
  #leftGroup{ display:flex; align-items:center; gap:12px; flex:0 0 auto; }
  #statusWrap{
    flex:0 0 auto;
    min-width:0;
    display:flex;
    justify-content:flex-start;
    max-width:45vw;
  }
  #status{
    font-size:14px;
    color:var(--muted);
    padding:0 4px;
    text-align:left;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  #rightGroup{
    display:flex;
    gap:10px;
    margin-left:auto;
  }
button{
    padding:7px 12px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.18);
    background: rgba(255,255,255,0.10);
    color:var(--text);
    cursor:pointer;
  }
  button:hover{ background: rgba(255,255,255,0.16); }

  select{
    padding:7px 10px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.18);
    background: rgba(255,255,255,0.10);
    color:var(--text);
    outline:none;
  }
  option{ color:#111; }

  #closeBtn{
    font-size:16px;
    line-height:1;
    padding:7px 12px;
  }

  #playPanel{
    display:flex;
    justify-content:center;
    align-items:flex-start;
    width:100%;
    box-sizing:border-box;

    /* Safe-area padding only; keep symmetric so centering is true.
       Note: var(--vb) is already subtracted from #game height. If we also add it here,
       we double-count the browser UI height and waste space above the URL bar. */
    padding-top:6px;
    padding-bottom: calc(env(safe-area-inset-bottom) + 6px);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
  }

  /* screen-reader-only / non-layout status text */
  .sr-only{
    position:absolute !important;
    width:1px !important;
    height:1px !important;
    padding:0 !important;
    margin:-1px !important;
    overflow:hidden !important;
    clip:rect(0,0,0,0) !important;
    white-space:nowrap !important;
    border:0 !important;
  }

  #game{
    touch-action: none;
    position:relative;

    /* Centering on iOS Safari: size against the *container*, not vw */
    width: min(900px, calc(100% - 12px));
    max-width: 900px;
    margin: 0 auto;

    height:min(600px, calc(var(--vvh) - var(--headerH) - var(--vb) - 12px));
    background: radial-gradient(900px 650px at 50% 35%, var(--gameA), var(--gameB));
    border:1px solid rgba(255,255,255,0.12);
    border-radius:18px;
    overflow:hidden;
    box-shadow: 0 20px 70px rgba(0,0,0,0.35);
    transition: background 160ms ease, box-shadow 220ms ease;
  }

  /* When photo background is active, make the play panel transparent so the photo shows through */
  #playPanel.photoBgActive #game{
    background: transparent !important;
  }
  #playPanel.photoBgActive #game.flashA{ background: rgba(31,47,102,0.32) !important; }
  #playPanel.photoBgActive #game.flashB{ background: rgba(13,22,51,0.38) !important; }
  #playPanel.photoBgActive .circle{ opacity: 0.90; }


  #game.flashA{ background: rgba(31,47,102,0.88); }
  #game.flashB{ background: rgba(13,22,51,0.92); }

  /* Gold success/failure transition */
  #game.goldA{
    background: radial-gradient(900px 650px at 50% 35%,
      rgba(255,236,170,0.88),
      rgba(255,196,80,0.58),
      rgba(16,26,53,0.92));
  }
  #game.goldB{
    background: radial-gradient(900px 650px at 50% 35%,
      rgba(255,250,210,0.95),
      rgba(255,215,120,0.66),
      rgba(16,26,53,0.94));
  }
  #game.goldGlow{
    box-shadow:
      0 0 0 3px rgba(255,215,120,0.35),
      0 0 45px rgba(255,215,120,0.95),
      0 0 110px rgba(255,215,120,0.60),
      0 0 180px rgba(255,215,120,0.28),
      0 20px 70px rgba(0,0,0,0.35);
  }

  /* Central arena (invisible boundary for placement) */
  #arena{
    position:absolute;
    left:15%;
    top:20%;
    width:70%;
    height:60%;
    pointer-events:none;
  }

  .circle{
    box-sizing: border-box;
    box-sizing: border-box;
    position:absolute;
    border-radius:50%;
    border:2px solid rgba(255,255,255,0.22);
    box-shadow: 0 10px 25px rgba(0,0,0,0.25);
    opacity:0;
    transform: scale(0.96);
    transition: opacity 160ms ease, transform 160ms ease, left 160ms ease, top 160ms ease, width 160ms ease, height 160ms ease;
    -webkit-tap-highlight-color: transparent;
    user-select:none;
    touch-action: manipulation;
    overscroll-behavior: none;
  }
  .circle.visible{ opacity:1; transform: scale(1); }

  /* Calmer encoding: keep previously shown circles lightly visible */
  .circle.dim{
    opacity: 0.35 !important;
    transform: scale(0.985);
    filter: saturate(0.95);
  }
  .circle.active{
    opacity: 1 !important;
    transform: scale(1.03);
    border-color: rgba(255,255,255,0.34);
    box-shadow:
      0 0 0 3px rgba(255,255,255,0.14),
      0 10px 25px rgba(0,0,0,0.25);
  }

  .circle.wrong{
    border-color: rgba(255,120,120,0.95);
    box-shadow: 0 0 0 4px rgba(255,120,120,0.18), 0 10px 25px rgba(0,0,0,0.25);
  }
  .circle.glow{
    border-color: rgba(255,215,120,0.98);
    box-shadow:
      0 0 0 4px rgba(255,215,120,0.28),
      0 0 22px rgba(255,215,120,0.90),
      0 0 46px rgba(255,215,120,0.60),
      0 10px 25px rgba(0,0,0,0.25);
    transition: box-shadow 220ms ease, border-color 220ms ease;
  }


  /* Lines layer (sequence connections) */
  #linesLayer{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    pointer-events:none;
    overflow:visible;
  }
  #linesLayer line{
    stroke: rgba(255,255,255,0.55);
    stroke-width: 2.25;
    stroke-linecap: round;
  }

  /* End screen */
  #overlay{
    z-index: 50;
    position:absolute;
    inset:0;
    background: rgba(0,0,0,0.55);
    display:none;
    align-items:center;
    justify-content:center;
    padding:18px;
  }
  #overlay.show{ display:flex; }
  #panel{
    position:relative;
    width:min(520px, 92vw);
    background: rgba(17,26,51,0.94);
    border:1px solid rgba(255,255,255,0.14);
    border-radius:18px;
    box-shadow: 0 25px 90px rgba(0,0,0,0.55);
    padding:18px 18px 14px;
  }
#viewsPill{ position:absolute; top:14px; right:16px; font-size:14px; }

  #panel h2{
    margin:0 0 8px;
    font-size:20px;
    font-weight:800;
    letter-spacing:0.2px;
  }
  #score{
    margin:10px 0 14px;
    font-size:34px;
    font-weight:900;
  }
  #panel p{
    margin:0 0 14px;
    color:var(--muted);
    line-height:1.35;
  }
  #panel .row{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    justify-content:flex-end;
  }

  /* --- v15: Primary Play button --- */
  button.primary{
    padding:10px 18px;
    font-size:16px;
    font-weight:700;
    letter-spacing:0.2px;
    border:1px solid rgba(255,255,255,0.28);
    background: rgba(255,255,255,0.12);
    box-shadow: 0 0 18px rgba(255,215,128,0.18);
    position:relative;
  }
  @keyframes softPulse{
    0%,100%{ box-shadow: 0 0 18px rgba(255,215,128,0.16); }
    50%{ box-shadow: 0 0 26px rgba(255,215,128,0.24); }
  }
  button.primary:not(:disabled){
    animation: softPulse 2.6s ease-in-out infinite;
  }

  /* --- v15: Background swatch strip --- */
  .bg-palette-wrap{
    display:flex;
    gap:10px;
    align-items:center;
    flex-wrap:wrap;
  }
  .bg-label{
    color:var(--muted);
    font-size:14px;
  }
  .bg-palette{
    display:flex;
    gap:8px;
    align-items:center;
    padding:4px 6px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.06);
    max-width:min(420px, 74vw);
    overflow-x:auto;
    -webkit-overflow-scrolling: touch;
  }
  .bg-swatch{
    width:26px;
    height:26px;
    border-radius:10px;
    border:1px solid rgba(255,255,255,0.22);
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.18);
    flex:0 0 auto;
    cursor:pointer;
    position:relative;
  }
  .bg-swatch[aria-selected="true"]{
    outline:2px solid rgba(255,255,255,0.85);
    outline-offset:2px;
  }


  /* --- v20: Swatches bar pinned at top-center of play field --- */
  #bgPaletteBar{
    position:absolute;
    top:10px;
    left:50%;
    transform: translateX(-50%);
    z-index: 30;
    pointer-events: auto;
  }
  #bgPaletteBar .bg-palette{
    max-width: min(520px, 92vw);
    background: rgba(0,0,0,0.18);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }

  /* --- v20: Close (X) button top-right; removes separate End button --- */
  #closeBtn{
    position:absolute;
    top:10px;
    right:10px;
    font-size:18px;
    line-height:1;
    padding:8px 12px;
  }
  #statusWrap{
    flex:0 0 auto;
    min-width:0;
    display:flex;
    justify-content:flex-start;
    max-width:45vw;
  }


  /* --- v19: Tuning controls (Timing + Size) --- */
  .tune-wrap{
    display:flex;
    gap:10px;
    align-items:center;
    flex-wrap:wrap;
  }
  .tune{
    display:flex;
    gap:8px;
    align-items:center;
    padding:4px 6px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.06);
  }
  .tune-label{
    color:var(--muted);
    font-size:14px;
    margin-right:2px;
  }
  .tune-btn{
    width:30px;
    height:30px;
    border-radius:10px;
    border:1px solid rgba(255,255,255,0.18);
    background: rgba(0,0,0,0.10);
    color:var(--text);
    font-weight:700;
    line-height:1;
  }
  .tune-btn:active{ transform: scale(0.98); }
  .dots{
    display:flex;
    gap:4px;
    align-items:center;
    padding:0 2px;
  }
  .dot{
    width:7px;
    height:7px;
    border-radius:50%;
    background: rgba(255,255,255,0.18);
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.25);
  }
  .dot.on{ background: rgba(255,255,255,0.80); }


  /* --- Miss allowance (3 dots) --- */
  .missBar{
    display:flex;
    gap:6px;
    align-items:center;
    padding:6px 10px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,0.14);
    background: rgba(255,255,255,0.06);
  }
  .missDot{
    width:10px; height:10px;
    border-radius:50%;
    background: rgba(255,255,255,0.85);
    box-shadow: 0 0 0 1px rgba(0,0,0,0.18) inset;
    opacity: 0.95;
  }
  .missDot.used{
    background: rgba(255,120,120,0.75);
    opacity: 0.55;
  }


  /* Photo background swatch button */
  .bgSwatch.photo{
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:16px;
    line-height:1;
    border-style:dashed;
    border-width:1px;
  }
  .bgSwatch.photo::after{ content:""; }
  .photoBgActive .bg-palette-wrap{ backdrop-filter: blur(2px); }


  /* Photo background: avoid cropping faces by using CONTAIN.
     Add a soft blurred "fill" behind so letterboxing looks good. */
  #playPanel.photoBgActive{
    position: relative;
    overflow: hidden;
    background-image: var(--photoUrl);
    background-size: contain;
    background-position: center center;
    background-repeat: no-repeat;
  }
  #playPanel.photoBgActive::before{
    content:"";
    position:absolute;
    inset:0;
    background-image: var(--photoUrl);
    background-size: cover;         /* fill behind (may crop, but blurred) */
    background-position: center center;
    background-repeat: no-repeat;
    filter: blur(18px) brightness(0.85);
    transform: scale(1.08);
    opacity: 0.85;
    z-index: 0;
    pointer-events:none;
  }
  #playPanel.photoBgActive > *{
    position: relative;
    z-index: 1;
  }


  background: rgba(0,0,0,0.18);
    pointer-events: none; /* allow clicks/taps to pass through to circles */
  }
  #overlay.photoMode #panel{
    background: rgba(17,26,51,0.12);
    border-color: rgba(255,255,255,0.12);
    backdrop-filter: blur(2px);
    pointer-events: none;
  }


  /* Photo overlay (foreground) */
  #photoOverlay{
    position:absolute;
    inset:0;
    display:none;
    pointer-events:none; /* let gameplay continue underneath */
    z-index: 5;
  }
  #photoOverlay.show{ display:block; }
  #photoOverlay::before{
    content:"";
    position:absolute; inset:0;
    background: rgba(0,0,0,0.18);
  }
  #photoOverlayImg{
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit: cover;
    object-position: center;
    opacity: 0.35;
    filter: saturate(1.02) contrast(1.02);
  }


  /* Ensure final score overlay covers the entire play area */
  #overlay{
    position:absolute;
    inset:0;
  }
  #overlay.show{
    display:flex;
  }
  #panel{
    max-height: calc(100% - 24px);
    overflow:auto;
  }


  #uploadBtn{
    padding: 12px 18px !important;
    min-width: 96px;
    font-weight: 800;
    letter-spacing: 0.2px;
  }


  /* Voice + Upload row */
  .voice-wrap{
    display:flex;
    gap:10px;
    align-items:center;
    flex-wrap:wrap;
    margin-top:8px;
  }
  .tune-btn.wide{
    width:auto !important;
    min-width: 92px;
    padding: 10px 14px !important;
    font-weight: 800;
    letter-spacing: 0.2px;
  }
  .pill{
    display:inline-flex;
    align-items:center;
    gap:6px;
    padding:8px 10px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,0.14);
    background: rgba(255,255,255,0.06);
    color: var(--muted);
    font-size:14px;
  }
  button:disabled{ opacity:0.45; }
  #recBtn.recording{
    border-color: rgba(255,80,80,0.9) !important;
    box-shadow: 0 0 0 2px rgba(255,80,80,0.25);
  }


  /* Center labels on Stop/Clear */
  #stopRecBtn, #clearRecBtn, #markRecBtn{
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
  }


  #panelBody{
    position:absolute;
    left:0;
    top:100%;
    width:100%;
    z-index:50;
    background: rgba(17,26,51,0.92);
    border-bottom: 1px solid rgba(255,255,255,0.10);
    padding:10px 12px 12px;
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    align-items:center;
    max-height: min(52dvh, 420px);
    overflow:auto;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }
  #panelBody.hidden{ display:none; }



    /* Record celebration flash */
    .record-flash {
      animation: recordFlash 1.2s ease-out 1;
    }
    @keyframes recordFlash {
      0%   { filter: brightness(1); }
      10%  { filter: brightness(1.8) saturate(1.6); }
      35%  { filter: brightness(1.2) saturate(1.2); }
      100% { filter: brightness(1) saturate(1); }
    }
    #recordToast {
      position: fixed;
      left: 50%;
      top: max(env(safe-area-inset-top), 10px);
      transform: translateX(-50%);
      background: rgba(255, 215, 0, 0.14);
      border: 1px solid rgba(255, 215, 0, 0.35);
      color: rgba(255,255,255,0.95);
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 14px;
      z-index: 9999;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: none;
      pointer-events: none;
      text-align: center;
      white-space: nowrap;
    }


/* New Best celebration flash */
body.bestFlash::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background: radial-gradient(circle at 50% 35%, rgba(255,215,0,0.45), rgba(255,215,0,0.0) 60%),
              rgba(255,215,0,0.10);
  mix-blend-mode: screen;
  animation: bestFlashAnim 0.9s ease-out forwards;
  z-index: 9999;
}
@keyframes bestFlashAnim{
  0%{ opacity:0; }
  10%{ opacity:1; }
  100%{ opacity:0; }
}

#panelBtn{ white-space:nowrap; }


#addTimeBtn,#addTimeOverlayBtn{padding:10px 16px;border-radius:14px;background:#f7931a;color:#fff;font-weight:800;border:none;box-shadow:0 4px 14px rgba(247,147,26,0.45);} 

#uploadBtn,#recBtn{padding:6px 10px !important;min-width:auto !important;font-weight:700;letter-spacing:0 !important;}
</style>

<style>
/* Hide old donate section inside Final Score panel */
#panel a[href*="paypal"] {
    display:none !important;
}
</style>

</head>
<body>
<div id="recordToast">New record! +10 minutes 🎉</div>
<header>
<div id="controls"><div id="leftGroup"><button class="primary" id="startBtn">Play</button><div class="missBar" id="missBar" title="Mistakes allowed (resets each round)">
<span class="missDot"></span><span class="missDot"></span><span class="missDot"></span>
</div><div class="hidden" id="panelBody">
<div aria-label="Voice recording" class="voice-wrap">
<button class="tune-btn wide" id="uploadBtn" title="Upload photo overlay (tap) / clear (hold)">Upload</button>
<button class="tune-btn wide" id="recBtn" title="Record voice (tap once per word as you speak)">Record</button>
<button class="tune-btn" disabled="" id="stopRecBtn" title="Stop recording">Stop</button>
<button class="tune-btn" disabled="" id="clearRecBtn" title="Clear recording">Clear</button>
<button class="tune-btn" disabled="" id="markRecBtn" title="Mark word boundary (use if screen taps miss)">Mark</button>
<button class="tune-btn wide" id="soundToggleBtn" title="Toggle sound effects on/off">Sound: On</button>
<select id="soundStyle" title="Choose sound style">
  <option value="synth">Synth</option>
  <option value="piano">Piano</option>
  <option value="laugh">Laughter</option>
  <option value="bark">Puppy Bark</option>
  <option value="meow">Cat Meow</option>
  <option value="roar">Lion Roar</option>
</select>
<span class="pill">Words: <b id="wordCount">0</b></span>
</div>
<div aria-label="Training tuning" class="tune-wrap">
<div aria-label="Timing" class="tune" role="group">
<span class="tune-label">Timing</span>
<button aria-label="Timing down" class="tune-btn" id="paceMinus">−</button>
<div aria-hidden="true" class="dots" id="paceDots"></div>
<button aria-label="Timing up" class="tune-btn" id="pacePlus">+</button>
</div>
<div aria-label="Circle size" class="tune" role="group">
<span class="tune-label">Size</span>
<button aria-label="Size down" class="tune-btn" id="sizeMinus">−</button>
<div aria-hidden="true" class="dots" id="sizeDots"></div>
<button aria-label="Size up" class="tune-btn" id="sizePlus">+</button>
</div>
</div>
</div></div>
<!-- status is kept off-layout to prevent iPhone Safari from shifting the header -->
<div id="status" class="sr-only" aria-live="polite"></div>
<div id="rightGroup"><button id="panelBtn" title="Show/hide the control panel">Panel</button>
<a href="https://www.paypal.com/paypalme/ConstantinosRagazas"
   target="_blank"
   rel="noopener"
   id="donateBtn"
   style="
     padding:10px 16px;
     border-radius:14px;
     background:#f7931a;
     color:white;
     font-weight:800;
     text-decoration:none;
     border:none;
     box-shadow:0 4px 14px rgba(247,147,26,0.45);
   ">
  Donate
</a>

<button id="closeBtn" title="Close">✕</button></div></div>
</header>
<div id="playPanel">
<div id="game">
<div aria-label="Background colors" id="bgPaletteBar">

<script>

  // === iOS Safari bottom bar mitigation (visualViewport) ===
  function __updateViewportVars(){
    try{
      const vv = window.visualViewport;
      const vvh = vv ? vv.height : window.innerHeight;
      const vb = vv ? Math.max(0, window.innerHeight - (vv.height + vv.offsetTop)) : 0;
      document.documentElement.style.setProperty('--vvh', vvh + 'px');
      document.documentElement.style.setProperty('--vb', vb + 'px');
      const header = document.querySelector('header');
      if(header){
        const hh = header.getBoundingClientRect().height;
        document.documentElement.style.setProperty('--headerH', hh + 'px');
      }
    }catch(e){}
  }
  window.addEventListener('resize', __updateViewportVars, {passive:true});
  if(window.visualViewport){
    window.visualViewport.addEventListener('resize', __updateViewportVars, {passive:true});
    window.visualViewport.addEventListener('scroll', __updateViewportVars, {passive:true});
  }
  document.addEventListener('DOMContentLoaded', __updateViewportVars);

  // Panel toggle (manual + auto hide while playing)
  const panelBtn = document.getElementById('panelBtn');
  const panelBody = document.getElementById('panelBody');
  let panelHidden = panelBody ? panelBody.classList.contains('hidden') : false;

  function setPanelHidden(h){
    panelHidden = !!h;
    if(panelBody) panelBody.classList.toggle('hidden', panelHidden);
    if(panelBtn) panelBtn.textContent = panelHidden ? 'Panel ▾' : 'Panel';
    __updateViewportVars();
  }
  // sync initial UI
  setPanelHidden(panelHidden);
  if(panelBtn){
    panelBtn.addEventListener('click', ()=> setPanelHidden(!panelHidden));
  }

  // Call this from game phases when you want auto-hide
  function __autoPanelForPhase(phaseName){
    // Hide panel during SHOW + RECALL. Show panel when idle/end.
    if(!panelBody) return;
    if(phaseName === 'show' || phaseName === 'recall'){
      setPanelHidden(true);
    }else if(phaseName === 'idle' || phaseName === 'ended'){
      setPanelHidden(false);
    }
  }
(() => {
  const game   = document.getElementById("game");
  const arena  = document.getElementById("arena");
  const startBtn = document.getElementById("startBtn");
  
  // --- Play count + time limit (persistent) ---
  const playCountEl = document.getElementById("playCount");
  const timeLeftEl  = document.getElementById("timeLeftOverlay");
  const addTimeBtn  = document.getElementById("addTimeOverlayBtn");
  const STORAGE_PLAY = "smt_total_plays";
  const STORAGE_WEEK = "smt_week_key";
  const STORAGE_WEEKHIGH = "smt_week_high";
  const STORAGE_TIME = "smt_time_left_seconds";
  const DEFAULT_MINUTES = 5; // initial allowed minutes
  const ADD_MINUTES = 5;      // per "Add Time" press
  let totalPlays = 0;
  let timeLeftS  = 0;
  let bestN = 2;
  let playTimer = null;

  function getWeekKey(date=new Date()){
    const d = new Date(date);
    d.setHours(0,0,0,0);
    // Week starts on Sunday (getDay() === 0)
    d.setDate(d.getDate() - d.getDay());
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,'0');
    const day = String(d.getDate()).padStart(2,'0');
    return `${y}-${m}-${day}`;
  }

  function loadPlayMeta(){
    // total views (persist)
    try{ totalPlays = Number(localStorage.getItem(STORAGE_PLAY) || 0) || 0; }catch(e){ totalPlays = 0; }

    // time is per-session: always reset on page load
    timeLeftS = DEFAULT_MINUTES*60;

    // weekly high: resets every Sunday midnight (local time)
    try{
      const wk = getWeekKey();
      const storedWk = localStorage.getItem(STORAGE_WEEK) || "";
      if(storedWk !== wk){
        localStorage.setItem(STORAGE_WEEK, wk);
        localStorage.setItem(STORAGE_WEEKHIGH, "2");
      }
      bestN = Number(localStorage.getItem(STORAGE_WEEKHIGH) || 2) || 2;
      bestN = Math.max(2, Math.floor(bestN));
    }catch(e){
      bestN = 2;
    }
  }
  function savePlayMeta(){
    try{ localStorage.setItem(STORAGE_PLAY, String(totalPlays)); }catch(e){}
    try{ localStorage.setItem(STORAGE_WEEKHIGH, String(bestN)); }catch(e){}
    // timeLeftS is session-only: do NOT persist
  }
  
  // --- Best N tracking + reward ---
  function maybeUpdateBest(newN){
    try{
      const n = parseInt(newN)||0;
      if(n>bestN){
        bestN = n;
        try{ localStorage.setItem(STORAGE_BEST, String(bestN)); }catch(e){}
        // reward: +10 minutes playtime
        timeLeftS += 10*60;
        savePlayMeta();
        renderPlayMeta();
        celebrateNewBest();
      }
    }catch(e){}
  }

  function celebrateNewBest(){
    // quick gold flash + simple "trumpet" motif using WebAudio
    try{
      document.body.classList.add('bestFlash');
      setTimeout(()=>document.body.classList.remove('bestFlash'), 900);
    }catch(e){}
    try{
      // (uses existing playTone/ensureAudio)
      const seq = [
        [523.25, 0.10], // C5
        [659.25, 0.10], // E5
        [783.99, 0.14], // G5
        [1046.5, 0.22], // C6
        [783.99, 0.12], // G5
        [1046.5, 0.28], // C6
      ];
      let t=0;
      for(const [f,d] of seq){
        setTimeout(()=>{ try{ playTone(f,d,0.35);}catch(_e){} }, t);
        t += Math.max(40, d*1000);
      }
    }catch(e){}
  }
function fmtTime(s){
    s = Math.max(0, Math.floor(s||0));
    const m = Math.floor(s/60);
    const r = s%60;
    return `${m}:${String(r).padStart(2,"0")}`;
  }
  function renderPlayMeta(){
    if(playCountEl) playCountEl.textContent = String(totalPlays);
    if(timeLeftEl) timeLeftEl.textContent = fmtTime(timeLeftS);
    if(startBtn) startBtn.disabled = (timeLeftS <= 0);
  }
  function showRecordToast(){
    const t = document.getElementById("recordToast");
    if(!t) return;
    t.style.display = "block";
    clearTimeout(showRecordToast._to);
    showRecordToast._to = setTimeout(()=>{ t.style.display="none"; }, 1600);
  }

  function flashRecord(){
    document.body.classList.remove("record-flash");
    // force reflow so animation restarts
    void document.body.offsetWidth;
    document.body.classList.add("record-flash");
  }

  // Simple trumpet-like fanfare (no external audio file)
  function playFanfare(){
    if(!soundOn) return;
    try{
      const AC = window.AudioContext || window.webkitAudioContext;
      if(!AC) return;
      const ctx = playFanfare._ctx || (playFanfare._ctx = new AC());
      const now = ctx.currentTime;

      const notes = [523.25, 659.25, 783.99, 1046.5]; // C5 E5 G5 C6
      notes.forEach((freq, i)=>{
        const t0 = now + i*0.12;
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.type = "sawtooth";
        o.frequency.setValueAtTime(freq, t0);

        g.gain.setValueAtTime(0.0001, t0);
        g.gain.exponentialRampToValueAtTime(0.20, t0+0.02);
        g.gain.exponentialRampToValueAtTime(0.0001, t0+0.18);

        // mild filter to soften
        const f = ctx.createBiquadFilter();
        f.type = "lowpass";
        f.frequency.setValueAtTime(2500, t0);

        o.connect(f); f.connect(g); g.connect(ctx.destination);
        o.start(t0);
        o.stop(t0+0.22);
      });
    }catch(e){}
  }

  function celebrateNewRecord(){
    flashRecord();
    showRecordToast();
    if(soundOn) playFanfare();
  }

  function ensurePlayTimer(){
    if(playTimer) return;
    playTimer = setInterval(()=>{
      // Count down ONLY while actively playing (showing/recall/transition)
      if(phase === "idle" || phase === "ended") return;
      if(timeLeftS <= 0) return;
      timeLeftS = Math.max(0, timeLeftS - 1);
      savePlayMeta();
      renderPlayMeta();
      if(timeLeftS <= 0){
        // time expired -> end current session and disable Play
        try{ runToken++; }catch(e){}
        try{ showFinalScore(); }catch(e){}
        try{ setStatus("Time is up. Tap \"Add Time\" to continue."); }catch(e){}
        renderPlayMeta();
      }
    }, 1000);
  }

  // init play meta
  loadPlayMeta();
  renderPlayMeta();
  ensurePlayTimer();

  if(addTimeBtn){
    addTimeBtn.addEventListener("click", ()=>{
      timeLeftS += 5*60;
      savePlayMeta();
      renderPlayMeta();
      setStatus("Added 5 minutes.");
    });
  }

  // Testing helper: reset weekly high back to 2 (so record/reward triggers are easy to test)
  const resetWeekHighBtn = document.getElementById("resetWeekHighBtn");
  function resetWeekHighTo2(){
    bestN = 2;
    try{ localStorage.setItem(STORAGE_WEEKHIGH, "2"); }catch(e){}
    savePlayMeta();
    renderPlayMeta();
    setLevel();
    setStatus("WeekHigh reset to 2 (testing).");
  }
  if(resetWeekHighBtn){
    resetWeekHighBtn.addEventListener("click", resetWeekHighTo2);
  }


  // ---- Forgiving misses (kid-friendly) ----
  const MISS_LIMIT = 3;     // per round
  let missesUsed = 0;
  const missBar = document.getElementById("missBar");
  function renderMisses(){
    if(!missBar) return;
    const dots = [...missBar.querySelectorAll(".missDot")];
    dots.forEach((d,i)=> d.classList.toggle("used", i < missesUsed));
  }

  function playFail(){
    if(!soundOn) return;
    // distinct fail sound (short descending buzz), safe if audio blocked
    try{
      if(!audioCtx) return;
      const t0 = audioCtx.currentTime;
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = "sawtooth";
      o.frequency.setValueAtTime(240, t0);
      o.frequency.exponentialRampToValueAtTime(120, t0 + 0.18);
      g.gain.setValueAtTime(0.0001, t0);
      g.gain.exponentialRampToValueAtTime(0.20, t0 + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.22);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(t0); o.stop(t0 + 0.24);
    }catch(e){}
  }

  function playShimmerMelody(){
    if(!soundOn) return;
    // Brief, pleasant 3-note sparkle to accompany the gold shimmer cue.
    // Safe if audio is blocked; uses the existing AudioContext.
    try{
      const ctx = ensureAudio();
    // audible confirmation (very short)
    try{ playToneForIndex(0, 90); }catch(e){}
      const now = ctx.currentTime;

      const notes = [659.25, 783.99, 987.77]; // E5, G5, B5
      const dur = 0.11;
      const gap = 0.03;

      notes.forEach((f, i) => {
        const t0 = now + i*(dur+gap);
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.type = "triangle";
        o.frequency.setValueAtTime(f, t0);

        g.gain.setValueAtTime(0.0001, t0);
        g.gain.exponentialRampToValueAtTime(0.18, t0 + 0.015);
        g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);

        o.connect(g); g.connect(ctx.destination);
        o.start(t0);
        o.stop(t0 + dur + 0.02);
      });
    }catch(e){}
  }

const closeBtn = document.getElementById("closeBtn");
  const statusEl = document.getElementById("status");
  const levelEl  = document.getElementById("level");

  // --- v19: Tuning module (no numbers; dot preview) ---
  const paceMinus = document.getElementById("paceMinus");
  const pacePlus  = document.getElementById("pacePlus");
  const sizeMinus = document.getElementById("sizeMinus");
  const sizePlus  = document.getElementById("sizePlus");
  const paceDots  = document.getElementById("paceDots");
  const sizeDots  = document.getElementById("sizeDots");

  // Levels 1..5 (3 is default)
  let paceLevel = 3;
  let sizeLevel = 3;

  function makeDots(el){
    if(!el) return;
    el.innerHTML = "";
    for(let i=0;i<5;i++){
      const d=document.createElement("div");
      d.className="dot";
      el.appendChild(d);
    }
  }
  makeDots(paceDots);
  makeDots(sizeDots);

  function setDots(el, level){
    if(!el) return;
    const kids=[...el.children];
    kids.forEach((d,i)=> d.classList.toggle("on", i < level));
  }

  function applyPace(){
    // paceLevel 1 fastest -> 5 slowest
    // More noticeable multipliers: 0.60, 0.80, 1.00, 1.35, 1.75
    const mult = [0.60, 0.80, 1.00, 1.35, 1.75][paceLevel-1];
    SHOW_MS = Math.round(700 * mult);
    GAP_MS  = Math.round(300 * mult);
    setDots(paceDots, paceLevel);
  }

  function applySize(){
    // sizeLevel 1 small -> 5 large
    RECALL_RADIUS = [16, 20, 24, 30, 36][sizeLevel-1];
    setDots(sizeDots, sizeLevel);
  }

  function initTuning(){
    applyPace(); applySize();
    if(paceMinus) paceMinus.addEventListener("click", ()=>{ paceLevel=Math.max(1, paceLevel-1); applyPace(); });
    if(pacePlus)  pacePlus .addEventListener("click", ()=>{ paceLevel=Math.min(5, paceLevel+1); applyPace(); });
    if(sizeMinus) sizeMinus.addEventListener("click", ()=>{ sizeLevel=Math.max(1, sizeLevel-1); applySize(); });
    if(sizePlus)  sizePlus .addEventListener("click", ()=>{ sizeLevel=Math.min(5, sizeLevel+1); applySize(); });
  }

  const overlay = document.getElementById("overlay");
  const scoreEl = document.getElementById("score");
  const restartFromOverlay = document.getElementById("restartFromOverlay");
  const closeFromOverlay = document.getElementById("closeFromOverlay");

  const linesLayer = document.getElementById("linesLayer");

  function clearLines(){
    while (linesLayer.firstChild) linesLayer.removeChild(linesLayer.firstChild);
  }

  function syncLinesViewport(){
    // Keep SVG coordinate system in the same pixel space as the #game box.
    const r = game.getBoundingClientRect();
    linesLayer.setAttribute("viewBox", `0 0 ${r.width} ${r.height}`);
    linesLayer.setAttribute("preserveAspectRatio", "none");
  }

  function drawLine(from, to){
    // from/to are in game-local coordinates (same as circle cx/cy).
    syncLinesViewport();
    const ln = document.createElementNS("http://www.w3.org/2000/svg", "line");
    ln.setAttribute("x1", from.cx);
    ln.setAttribute("y1", from.cy);
    ln.setAttribute("x2", to.cx);
    ln.setAttribute("y2", to.cy);
    ln.setAttribute("opacity", "0.85");
    linesLayer.appendChild(ln);
  }


  // ---------- Tuning knobs ----------
  const MIN_N = 2;
  const MAX_N = 30;

  let SHOW_MS = 650;
  let GAP_MS  = 250;

  const SHOW_RADIUS_MIN = 34;
  const SHOW_RADIUS_MAX = 54;

  let RECALL_RADIUS   = 22;    // adjustable size for recall
  const PADDING_BETWEEN = 12;    // non-overlap margin

  const BETWEEN_ROUNDS_MS = 900; // pause after success/fail

  // pre-round cue
  const PRE_ROUND_DELAY_MS = 650;
  const FLICKER_COUNT = 2;
  const FLICKER_STEP_MS = 90;

  // ---------- Distinct primary-ish colors ----------
  const COLOR_PALETTE = [
    { name:"red",     h:  0,  s:92, l:58 },
    { name:"blue",    h:210,  s:92, l:58 },
    { name:"yellow",  h: 52,  s:95, l:55 },
    { name:"green",   h:120,  s:85, l:48 },
    { name:"magenta", h:305,  s:88, l:58 },
    { name:"cyan",    h:185,  s:92, l:55 },
    { name:"orange",  h: 28,  s:95, l:56 },
    { name:"violet",  h:260,  s:88, l:60 },
    { name:"lime",    h: 85,  s:92, l:52 },
    { name:"pink",    h:330,  s:90, l:60 },
    { name:"teal",    h:165,  s:80, l:48 },
    { name:"amber",   h: 42,  s:95, l:56 },
  ];

  // ---------- Bold, distinct tones (fixed mapping) ----------
  const NOTE_FREQS = [
    220.00, 261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 659.25,
    783.99, 880.00, 987.77, 1046.50
  ];
  const WAVEFORMS = ["sine", "triangle", "square", "sawtooth"];

  let audioCtx = null;
  function ensureAudio() {
    audioCtx ??= new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === "suspended") audioCtx.resume();
    return audioCtx;
  }

  // iOS audio unlock (first user gesture)
  window.addEventListener("touchstart", () => { try{ ensureAudio(); }catch(e){} }, { once:true, passive:true });


  function playToneForIndex(idx, ms=140) {
    // Backward-compatible entrypoint: plays a "hit" sound in the chosen style.
    if(!soundOn) return;
    const style = (soundStyleSel && soundStyleSel.value) ? soundStyleSel.value : "synth";
    const ctx = ensureAudio();
    if(!ctx) return;

    const now = ctx.currentTime;

    function envGain(g, t0, peak=0.22, attack=0.008, release=ms/1000){
      g.gain.setValueAtTime(0.0001, t0);
      g.gain.exponentialRampToValueAtTime(peak, t0 + attack);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + Math.max(0.02, release));
    }

    function playSynth(){
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.frequency.value = NOTE_FREQS[idx % NOTE_FREQS.length];
      o.type = WAVEFORMS[idx % WAVEFORMS.length];
      envGain(g, now, 0.22);
      o.detune.setValueAtTime(0, now);
      o.detune.linearRampToValueAtTime(6, now + 0.03);
      o.detune.linearRampToValueAtTime(0, now + 0.09);
      o.connect(g); g.connect(ctx.destination);
      o.start(now);
      o.stop(now + ms/1000 + 0.04);
    }

    function playPiano(){
      const base = NOTE_FREQS[idx % NOTE_FREQS.length];
      const ratios = [1, 1.2599, 1.4983]; // M3, P5
      const filt = ctx.createBiquadFilter();
      filt.type = "lowpass";
      filt.frequency.setValueAtTime(2600, now);
      filt.Q.setValueAtTime(0.7, now);
      filt.connect(ctx.destination);

      ratios.forEach((r,i)=>{
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.type = "triangle";
        o.frequency.setValueAtTime(base*r, now);
        const peak = 0.18/(i+1);
        envGain(g, now, peak, 0.006, max(0.10, ms/1000*1.4));
        o.connect(g); g.connect(filt);
        o.start(now);
        o.stop(now + max(0.18, ms/1000*1.5));
      });
    }

    function playNoiseBurst(duration=0.14, peak=0.22, hp=120, bp=900){
      const len = Math.max(1, Math.floor(ctx.sampleRate * duration));
      const buf = ctx.createBuffer(1, len, ctx.sampleRate);
      const data = buf.getChannelData(0);
      for(let i=0;i<len;i++) data[i] = (Math.random()*2-1);
      const src = ctx.createBufferSource();
      src.buffer = buf;

      const hpf = ctx.createBiquadFilter();
      hpf.type = "highpass";
      hpf.frequency.setValueAtTime(hp, now);

      const bpf = ctx.createBiquadFilter();
      bpf.type = "bandpass";
      bpf.frequency.setValueAtTime(bp, now);
      bpf.Q.setValueAtTime(6.0, now);

      const g = ctx.createGain();
      envGain(g, now, peak, 0.006, duration);

      src.connect(hpf); hpf.connect(bpf); bpf.connect(g); g.connect(ctx.destination);
      src.start(now);
      src.stop(now + duration + 0.02);
    }

    function playBark(){
      playNoiseBurst(0.10, 0.22, 180, 950);
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = "sawtooth";
      const f0 = 220 + (idx%6)*25;
      o.frequency.setValueAtTime(f0, now);
      o.frequency.exponentialRampToValueAtTime(f0*0.6, now+0.08);
      envGain(g, now, 0.10, 0.004, 0.10);
      o.connect(g); g.connect(ctx.destination);
      o.start(now);
      o.stop(now+0.12);
    }

    function playMeow(){
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = "triangle";
      const f1 = 420 + (idx%8)*22;
      const f2 = f1*1.8;
      o.frequency.setValueAtTime(f1, now);
      o.frequency.linearRampToValueAtTime(f2, now+0.08);
      o.frequency.linearRampToValueAtTime(f1*0.85, now+0.18);
      const lfo = ctx.createOscillator();
      const lfoG = ctx.createGain();
      lfo.frequency.value = 7.0;
      lfoG.gain.value = 10.0;
      lfo.connect(lfoG); lfoG.connect(o.frequency);
      envGain(g, now, 0.18, 0.01, 0.22);
      o.connect(g); g.connect(ctx.destination);
      lfo.start(now); lfo.stop(now+0.22);
      o.start(now); o.stop(now+0.24);
    }

    function playRoar(){
      const duration = 0.28;
      const len = Math.max(1, Math.floor(ctx.sampleRate * duration));
      const buf = ctx.createBuffer(1, len, ctx.sampleRate);
      const data = buf.getChannelData(0);
      for(let i=0;i<len;i++){
        data[i] = (i? (data[i-1] + (Math.random()*2-1)*0.08) : (Math.random()*2-1)*0.3);
      }
      const src = ctx.createBufferSource();
      src.buffer = buf;

      const bp = ctx.createBiquadFilter();
      bp.type = "bandpass";
      bp.frequency.setValueAtTime(220, now);
      bp.frequency.linearRampToValueAtTime(420, now+duration);
      bp.Q.setValueAtTime(1.8, now);

      const g = ctx.createGain();
      g.gain.setValueAtTime(0.0001, now);
      g.gain.exponentialRampToValueAtTime(0.25, now+0.05);
      g.gain.exponentialRampToValueAtTime(0.0001, now+duration);

      src.connect(bp); bp.connect(g); g.connect(ctx.destination);
      src.start(now);
      src.stop(now + duration + 0.02);
    }

    function playLaugh(){
      const pulses = 4 + (idx % 2);
      for(let i=0;i<pulses;i++){
        const t0 = now + i*0.06;
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.type = "square";
        o.frequency.setValueAtTime(280 + (idx%6)*18, t0);

            placed = true;
            break;
          }
        }

        if (!placed) { ok = false; break; }
      }

      if (ok) break;
    }

    return centers.slice(0, n).map(c => ({
      cx: c.cx,
      cy: c.cy,
      rShow: rand(SHOW_RADIUS_MIN, SHOW_RADIUS_MAX)
    }));
  }

  async function runRound(token) {
    // Reset misses at the start of each round
    missesUsed = 0;
    renderMisses();

    phase = "transition";
    clearBoard();
    syncLinesViewport();
    setLevel();
    ROUND_RADIUS = RECALL_RADIUS; // lock radius for this round

    setStatus("Get ready…");
    await preRoundCue(token);
    if (token !== runToken) return;

    phase = "showing";
    setStatus(`Watch the sequence… (${N})`);

    const colorOrder = shuffle([...COLOR_PALETTE]);

    circles = nonOverlappingPlacement(N).map((pos, i) => {
      const color = colorOrder[i % colorOrder.length];
      const freq  = NOTE_FREQS[i % NOTE_FREQS.length];
      const wave  = WAVEFORMS[i % WAVEFORMS.length];
      return { ...pos, index:i, color, freq, wave, el:null };
    });

    circles.forEach(c => {
      makeCircleElement(c);
      setCircleGeometry(c, c.rShow);
      c.el.classList.remove("wrong","visible","glow");
    });

    for (let i=0; i<N; i++) {
      if (token !== runToken) return;
      const c = circles[i];

      // Keep already-shown circles on-screen (dim), highlight current one.
      for (let j=0; j<i; j++){
        const p = circles[j];
        p.el.classList.add("visible");
        p.el.classList.remove("active");
        p.el.classList.add("dim");
      }

      // Draw the line from previous to current (center-to-center)
      if (i > 0) drawLine(circles[i-1], c);

      c.el.classList.add("visible");
      c.el.classList.remove("dim");
      c.el.classList.add("active");

      playToneForIndex(c.index, Math.min(190, Math.floor(SHOW_MS*0.30)));

      // Timing pacing (no word voicing during SHOW phase)
      await sleep(SHOW_MS);

      // After its turn, keep it on-screen but dimmed (no popping)
      c.el.classList.remove("active");
      c.el.classList.add("dim");

      await sleep(GAP_MS);
    }

    // NEW: erase lines before player starts clicking
    clearLines();

    // Calm transition: remove dim/active styling before recall layout
    circles.forEach(c => {
      c.el.classList.remove("active","dim");
      // hide briefly to avoid size-teleport feeling
      c.el.classList.remove("visible");
    });
    await sleep(120);

    phase = "recall";
    expectedIndex = 0;

    circles.forEach(c => {
      setCircleGeometry(c, (ROUND_RADIUS ?? RECALL_RADIUS));
      c.el.classList.add("visible");
    });

    setStatus(`Your turn: click in order (1 → ${N}).`);
  }

  async function handleClick(circleObj) {
    const i = circleObj.index;

    // Do not process next click until current word playback finishes
    if (voiceBusy) return;

    if (i === expectedIndex) {
      voiceBusy = true;
      try{
        playToneForIndex(circleObj.index, 135);

        circleObj.el.classList.add("glow");
        setTimeout(() => circleObj.el?.classList.remove("glow"), 160);

        // Speak ONLY on the correct click, and wait for it to finish
        try{
          const didVoice = await playWord(circleObj.index);
          if(!didVoice){
            // no recorded words: tiny pause so UI still feels paced
            await sleep(60);
          }
        }catch(e){
          // ignore voice errors but keep pacing consistent
          await sleep(60);
        }

        // Now remove the circle (after voice completes)
        circleObj.el?.remove();

        expectedIndex++;
        // Update spoken word counter and UI
        if(voice) voice.wordIndex = expectedIndex;
        try{ updateWordCountUI(); }catch(e){}

        if (expectedIndex >= N) onSuccess();
        else setStatus(`Good! Next: ${expectedIndex + 1} of ${N}.`);
      } finally {
        voiceBusy = false;
      }
    } else {
      // Wrong click: allow up to MISS_LIMIT misses per round (do not end immediately)
      playFail();
      missesUsed = Math.min(MISS_LIMIT, missesUsed + 1);
      renderMisses();

      circleObj.el.classList.add("wrong");
      setTimeout(() => circleObj.el?.classList.remove("wrong"), 260);

      const remaining = MISS_LIMIT - missesUsed;
      if (remaining > 0) {
        setStatus(`Almost! Try again. ${remaining} ${remaining === 1 ? "chance" : "chances"} left.`);
      } else {
        // Out of chances => end round as a fail
        onFailure();
      }
    }
  }

  async function onSuccess() {
    phase = "transition";
    maxNThisSession = Math.max(maxNThisSession, N);
        maybeUpdateBest(maxNThisSession);
    setStatus(`✅ Success! Next round…`);
    await goldTransition(runToken);
    N = clamp(N + 1, MIN_N, MAX_N);
    await sleep(BETWEEN_ROUNDS_MS);
    if (phase !== "transition") return;
    await runRound(runToken);
  }

  async function onFailure() {
    phase = "transition";
    maxNThisSession = Math.max(maxNThisSession, N);
        maybeUpdateBest(maxNThisSession);
    setStatus(`❌ Wrong order. Adjusting…`);
    await goldTransition(runToken);
    N = clamp(N - 1, MIN_N, MAX_N);
    await sleep(BETWEEN_ROUNDS_MS);
    if (phase !== "transition") return;
    await runRound(runToken);
  }

  function showFinalScore(){
    isRunning = false;
    if(startBtn) startBtn.textContent = "Play";
phase = "ended";
    clearBoard();
    scoreEl.textContent = `N = ${maxNThisSession}`;
    overlay.classList.add("show");
    setStatus("Game ended.");
    setLevel();
    try{ renderPlayMeta(); }catch(e){}
  }

  function attemptClose(){
    try { window.close(); } catch(e) {}
  }

  function endGame(){
    runToken++;
    showFinalScore();
  }

  closeBtn.addEventListener("click", () => {
    // Make ✕ behave like a real close as much as the browser allows.
    // iOS Safari won't usually let scripts close tabs, but we can at least stop the game.
    try{ endGame(); }catch(_e){}
    try{ attemptClose(); }catch(_e){}
  });

  closeFromOverlay.addEventListener("click", () => {
    overlay.classList.remove("show");
    setStatus("Score panel closed.");
  });
  if (restartFromOverlay) restartFromOverlay.addEventListener("click", () => {
    // If we are in photoMode, keep overlay shown; otherwise hide it.
    if(!overlay.classList.contains("photoMode")) overlay.classList.remove("show");
    startGame();
  });

  function startGame(){
    isRunning = true;
    if(startBtn) startBtn.textContent = "End";
if(timeLeftS <= 0){
      renderPlayMeta();
      setStatus("No time left. Tap \"Add Time\".");
      return;
    }
    // Count a Play press (persistent)
    totalPlays += 1;
    savePlayMeta();
    renderPlayMeta();

    ensureAudio();
    lockViewport();
    overlay.classList.remove("show");
    runToken++;
    phase = "idle";
    N = 2;
    maxNThisSession = 2;
    setLevel();
    clearBoard();
    setStatus("Starting…");
    sleep(120).then(async () => { await goldTransition(runToken); await runRound(runToken); });
}

  startBtn.addEventListener("click", () => {
    if(isRunning){
      endGame();
    }else{
      startGame();
    }
  });
})();
</script>
</body>
