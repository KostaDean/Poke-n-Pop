<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Endless Random Circles (HoldStack)</title>
<style>
  html,body{margin:0;height:100%;background:#111;overflow:hidden;font-family:-apple-system,system-ui,Segoe UI,Roboto,Arial,sans-serif}
  #ui{
    position:fixed;left:12px;top:12px;z-index:10;
    background:rgba(0,0,0,.45);backdrop-filter: blur(6px);
    border:1px solid rgba(255,255,255,.12);border-radius:12px;
    padding:10px 12px;color:#eee;display:flex;gap:10px;align-items:center;flex-wrap:wrap;
  }
  #ui button{background:#222;color:#eee;border:1px solid rgba(255,255,255,.18);border-radius:10px;padding:8px 10px;font-size:14px}
  #ui button:active{transform:scale(.98)}
  #ui label{display:flex;gap:6px;align-items:center;font-size:13px;opacity:.95}
  #ui input[type="range"]{width:120px}
  #stats{font-size:13px;opacity:.9}
  canvas{display:block}
</style>
</head>
<body>
<div id="ui">
  <button id="toggle">Pause</button>
  <button id="clear">Clear</button>
  <label>Speed <input id="speed" type="range" min="1" max="120" value="30"></label>
  <label>Dot <input id="dot" type="range" min="1" max="6" value="2"></label>
  <div id="stats">circles: <span id="count">0</span></div>
</div>
<canvas id="c"></canvas>

<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d', { alpha: false });
  const countEl = document.getElementById('count');
  const speedEl = document.getElementById('speed');
  const dotEl = document.getElementById('dot');
  const toggleBtn = document.getElementById('toggle');
  const clearBtn = document.getElementById('clear');

  // Two colors per your rule (Dm-Rm > 0 => color1, < 0 => color2).
  const color1 = '#58a6ff'; // outside nearest circle
  const color2 = '#ff6b6b'; // inside nearest circle
  const bg = '#111';

  let W = 0, H = 0, DPR = 1;
  function resize() {
    DPR = Math.max(1, Math.min(3, window.devicePixelRatio || 1));
    W = Math.floor(window.innerWidth);
    H = Math.floor(window.innerHeight);
    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    // repaint background
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);
    // redraw all circles
    for (const cir of holdStack) drawCircle(cir);
  }
  window.addEventListener('resize', resize, { passive: true });

  // HoldStack: stores {x,y,r,sign}
  const holdStack = [];

  function rand(min, max) { return min + Math.random() * (max - min); }

  function drawCircle(cir) {
    const {x,y,r,sign} = cir;
    const stroke = (sign >= 0) ? color1 : color2;

    // circle outline
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.strokeStyle = stroke;
    ctx.lineWidth = 1;
    ctx.stroke();

    // center dot
    const dotR = Number(dotEl.value) || 2;
    ctx.beginPath();
    ctx.arc(x, y, dotR, 0, Math.PI * 2);
    ctx.fillStyle = stroke;
    ctx.fill();

    // radius tick (line to the right)
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x + r, y);
    ctx.strokeStyle = stroke;
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  function addOneCircle() {
    const x = rand(10, W - 10);
    const y = rand(10, H - 10);

    // First circle: pick a reasonable starter radius
    if (holdStack.length === 0) {
      const r0 = Math.min(W, H) * 0.12;
      const cir0 = { x, y, r: Math.max(6, r0), sign: 1 };
      holdStack.push(cir0);
      drawCircle(cir0);
      countEl.textContent = String(holdStack.length);
      return;
    }

    // Find minimum distance Dm to any saved center; also grab that circle's radius Rm
    let best = null;
    let bestD = Infinity;

    for (const c of holdStack) {
      const dx = x - c.x;
      const dy = y - c.y;
      const d = Math.hypot(dx, dy);
      if (d < bestD) { bestD = d; best = c; }
    }

    const Dm = bestD;
    const Rm = best.r;
    const diff = Dm - Rm;

    // Your formula: abs(Dm-Rm) - 3
    let rNew = Math.abs(diff) - 3;

    // Practical guardrails so it keeps drawing (negative/too tiny radii are not drawable)
    // This doesn't change the rule; it just skips/limits degenerate circles.
    if (!Number.isFinite(rNew) || rNew < 1) return;

    // Avoid absurdly large circles that fill everything.
    const rMax = Math.min(W, H) * 0.45;
    if (rNew > rMax) rNew = rMax;

    const cir = { x, y, r: rNew, sign: (diff >= 0 ? 1 : -1) };
    holdStack.push(cir);
    drawCircle(cir);
    countEl.textContent = String(holdStack.length);
  }

  let running = true;
  toggleBtn.addEventListener('click', () => {
    running = !running;
    toggleBtn.textContent = running ? 'Pause' : 'Resume';
  });

  clearBtn.addEventListener('click', () => {
    holdStack.length = 0;
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);
    countEl.textContent = '0';
  });

  // Main loop: add N circles per frame depending on speed slider
  function frame() {
    if (running) {
      const perFrame = Math.max(1, Math.floor(Number(speedEl.value) / 10));
      // Also modulate by FPS-ish: if speed is low, add fewer.
      const extra = Number(speedEl.value) >= 60 ? 2 : 1;
      for (let i = 0; i < perFrame * extra; i++) addOneCircle();
    }
    requestAnimationFrame(frame);
  }

  resize();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
