<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>HoldStack Circles (Manual + Continuous)</title>
<style>
html, body{
  margin:0; padding:0; height:100%;
  overflow:hidden;
  background:#0b0f14;
  touch-action:none;
  -webkit-user-select:none; user-select:none;
  font-family:-apple-system, system-ui, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
}
#c{display:block; width:100vw; height:100vh;}

#ui{
  position:fixed; left:12px; right:12px; top:12px; z-index:10;
  display:flex; gap:10px; align-items:center; flex-wrap:wrap;
  padding:10px 12px; border-radius:12px;
  background:rgba(20,28,38,0.72);
  backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
  color:#e9eef6; box-sizing:border-box;
}
#ui button{
  border:0; border-radius:10px; padding:10px 12px;
  font-size:14px; font-weight:600; color:#e9eef6;
  background:rgba(255,255,255,0.10);
}
#ui button:active{transform:scale(0.98);}
#ui input[type="range"]{width:130px;}
#stats{margin-left:auto; font-size:12px; opacity:0.9;}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="ui">
  <button id="next">Next</button>
  <button id="auto">Auto: Off</button>
  <button id="reset">Reset</button>

  <label>Speed</label>
  <input id="speed" type="range" min="1" max="60" value="10" />
  <span id="speedVal">10/s</span>

  <label>Padding</label>
  <input id="pad" type="range" min="0" max="30" value="6" />
  <span id="padVal">6</span>

  <div id="stats">N=0</div>
</div>

<script>
(() => {
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d', {alpha:false});

const C = { fill:"rgba(70,130,255,0.22)", stroke:"rgba(70,130,255,0.85)" };

let holdStack = [];
let autoRunning = false;

const nextBtn = document.getElementById('next');
const autoBtn = document.getElementById('auto');
const resetBtn = document.getElementById('reset');
const speedEl = document.getElementById('speed');
const speedVal = document.getElementById('speedVal');
const padEl = document.getElementById('pad');
const padVal = document.getElementById('padVal');
const statsEl = document.getElementById('stats');

function rand(min,max){ return min + Math.random()*(max-min); }

function resize(){
  const dpr = Math.max(1, Math.min(3, window.devicePixelRatio || 1));
  canvas.width = Math.floor(window.innerWidth * dpr);
  canvas.height = Math.floor(window.innerHeight * dpr);
  canvas.style.width = window.innerWidth+"px";
  canvas.style.height = window.innerHeight+"px";
  ctx.setTransform(dpr,0,0,dpr,0,0);
  clearCanvas(); redrawAll();
}
window.addEventListener('resize', resize);

function clearCanvas(){
  ctx.fillStyle="#0b0f14";
  ctx.fillRect(0,0,window.innerWidth,window.innerHeight);
}

function drawCircle(c){
  ctx.beginPath();
  ctx.arc(c.x,c.y,c.r,0,Math.PI*2);
  ctx.fillStyle=C.fill;
  ctx.fill();
  ctx.lineWidth=1.25;
  ctx.strokeStyle=C.stroke;
  ctx.stroke();
}

function redrawAll(){ for(const c of holdStack) drawCircle(c); }

function fitsAll(cNew,padding){
  for(const c of holdStack){
    const d = Math.hypot(cNew.x-c.x,cNew.y-c.y);
    if(d <= (cNew.r + c.r + padding)) return false;
  }
  return true;
}

function init(){
  holdStack=[];
  clearCanvas();
  const w=window.innerWidth, h=window.innerHeight;
  const r0 = rand(Math.min(w,h)*0.08, Math.min(w,h)*0.18);
  const c0={ r:r0, x:rand(r0,w-r0), y:rand(r0,h-r0) };
  holdStack.push(c0);
  drawCircle(c0);
  statsEl.textContent="N=1";
}

function attemptAdd(){
  const w=window.innerWidth, h=window.innerHeight;
  const padding=parseFloat(padEl.value)||0;
  const MAX_TRIES=1500;

  for(let i=0;i<MAX_TRIES;i++){
    const r=rand(10,120);
    const x=rand(r,w-r);
    const y=rand(r,h-r);
    const cNew={x,y,r};
    if(fitsAll(cNew,padding)){
      holdStack.push(cNew);
      drawCircle(cNew);
      statsEl.textContent="N="+holdStack.length;
      return true;
    }
  }
  return false;
}

// Manual
nextBtn.onclick=()=>attemptAdd();

// Auto toggle
autoBtn.onclick=()=>{
  autoRunning=!autoRunning;
  autoBtn.textContent=autoRunning?"Auto: On":"Auto: Off";
};

// Loop
let last=performance.now();
let acc=0;

function loop(t){
  requestAnimationFrame(loop);
  const dt=(t-last)/1000;
  last=t;

  if(!autoRunning) return;

  const rate=parseFloat(speedEl.value)||1;
  const interval=1/rate;

  acc+=dt;
  while(acc>=interval){
    attemptAdd();
    acc-=interval;
  }
}

resetBtn.onclick=()=>init();

speedEl.oninput=()=>speedVal.textContent=speedEl.value+"/s";
padEl.oninput=()=>padVal.textContent=padEl.value;

resize();
speedVal.textContent=speedEl.value+"/s";
padVal.textContent=padEl.value;
init();
requestAnimationFrame(loop);
})();
</script>
</body>
</html>
