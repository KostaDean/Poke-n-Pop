
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Piglet Escape Game</title>
<style>
body { margin:0; overflow:hidden; background:#0a3b5a; }
canvas { display:block; }
#panel {
  position:absolute;
  top:10px;
  right:10px;
  background:rgba(0,0,0,0.6);
  color:white;
  padding:10px;
  border-radius:8px;
  display:none;
  font-family:sans-serif;
}
</style>
</head>
<body>

<canvas id="game"></canvas>
<div id="panel">Control Panel</div>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const panel = document.getElementById("panel");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

const escapeSprite = new Image();
escapeSprite.src = "assets/sfx/escape.png";

const lookSprite = new Image();
lookSprite.src = "assets/sfx/look_back.png";

const oink = new Audio("assets/sfx/pig_oink.mp3");

const pigs = [];
const N = 10;

for(let i=0;i<N;i++){
  pigs.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: 40,
    state:"circle",
    frame:0,
    timer:0,
    dust:[],
    target:null,
    progress:0
  });
}

let lastTap = 0;

canvas.addEventListener("touchend", tap);
canvas.addEventListener("mousedown", tap);

function togglePanel(){
  panel.style.display = panel.style.display === "none" ? "block":"none";
}

function tap(e){

  let now = Date.now();

  if(now-lastTap<300){
    togglePanel();
    lastTap=0;
    return;
  }
  lastTap=now;

  const rect = canvas.getBoundingClientRect();
  const x = (e.touches?e.touches[0].clientX:e.clientX)-rect.left;
  const y = (e.touches?e.touches[0].clientY:e.clientY)-rect.top;

  for(let pig of pigs){

    if(pig.state!=="circle") continue;

    const dx=x-pig.x;
    const dy=y-pig.y;
    const d=Math.sqrt(dx*dx+dy*dy);

    if(d<pig.r*0.5){
      pig.state="pop";
      pig.timer=300;
      return;
    }

    if(d<pig.r){
      pig.state="reaction";
      pig.timer=400;
      oink.currentTime = 0;
      oink.play();

      let len=Math.sqrt(dx*dx+dy*dy);
      let vx = dx/len;
      let vy = dy/len;

      pig.target={
        x:pig.x+vx*200,
        y:pig.y+vy*200
      };

      return;
    }

  }

}

function spawnPoof(pig){

  for(let i=0;i<10;i++){
    pig.dust.push({
      x:pig.x,
      y:pig.y,
      vx:(Math.random()-0.5)*4,
      vy:(Math.random()-0.5)*4,
      life:400
    });
  }

}

function update(dt){

for(let pig of pigs){

if(pig.state==="reaction"){
  pig.timer-=dt;
  if(pig.timer<=0){

    spawnPoof(pig);   // launch dust burst

    pig.state="dust";
    pig.progress=0;
  }
}

else if(pig.state==="dust"){

  pig.progress+=dt*0.001;

  const tx = pig.x + (pig.target.x-pig.x)*pig.progress;
  const ty = pig.y + (pig.target.y-pig.y)*pig.progress;

  pig.dust.push({x:tx,y:ty,vx:0,vy:0,life:500});

  if(pig.progress>=1){
    pig.state="look";
    pig.timer=800;
    pig.x=pig.target.x;
    pig.y=pig.target.y;
  }

}

else if(pig.state==="look"){
  pig.timer-=dt;
  if(pig.timer<=0){
    pig.state="circle";
  }
}

}

for(let pig of pigs){
  for(let d of pig.dust){
    d.life-=dt;
    d.x += d.vx;
    d.y += d.vy;
  }
  pig.dust=pig.dust.filter(d=>d.life>0);
}

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

for(let pig of pigs){

for(let d of pig.dust){

let a=d.life/500;

ctx.globalAlpha=a;
ctx.beginPath();
ctx.arc(d.x,d.y,8,0,Math.PI*2);
ctx.fillStyle="#d8d2b5";
ctx.fill();

}

ctx.globalAlpha=1;

if(pig.state==="circle"){
ctx.beginPath();
ctx.arc(pig.x,pig.y,pig.r,0,Math.PI*2);
ctx.fillStyle="#ff99aa";
ctx.fill();
}

else if(pig.state==="reaction"){
ctx.drawImage(escapeSprite,0,0,512,512,pig.x-40,pig.y-40,80,80);
}

else if(pig.state==="look"){
ctx.drawImage(lookSprite,0,0,512,512,pig.x-40,pig.y-40,80,80);
}

}

}

let last=0;

function loop(t){

let dt=t-last;
last=t;

update(dt);
draw();

requestAnimationFrame(loop);
}

requestAnimationFrame(loop);

</script>
</body>
</html>
