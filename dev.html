<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>HoldStack Circles (Reject Overlap)</title>
  <style>
    html, body{
      margin:0; padding:0; height:100%;
      overflow:hidden;
      background:#0b0f14;
      touch-action:none;
      -webkit-user-select:none; user-select:none;
      font-family:-apple-system, system-ui, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    }
    #c{display:block; width:100vw; height:100vh;}

    #ui{
      position:fixed; left:12px; right:12px; top:12px; z-index:10;
      display:flex; gap:10px; align-items:center; flex-wrap:wrap;
      padding:10px 12px; border-radius:12px;
      background:rgba(20,28,38,0.72);
      backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
      color:#e9eef6; box-sizing:border-box;
    }
    #ui button{
      border:0; border-radius:10px; padding:10px 12px;
      font-size:14px; font-weight:600; color:#e9eef6;
      background:rgba(255,255,255,0.10); white-space:nowrap;
    }
    #ui button:active{transform:scale(0.98);}
    #ui label{font-size:13px; opacity:0.9;}
    #ui input[type="range"]{width:140px;}
    #stats{margin-left:auto; font-size:12px; opacity:0.9;}

    #hint{
      position:fixed; left:12px; bottom:12px; z-index:10;
      padding:10px 12px; border-radius:12px;
      background:rgba(20,28,38,0.55);
      backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
      color:#e9eef6; font-size:12px; line-height:1.25;
      max-width:86vw; box-sizing:border-box;
    }
    .mono{font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;}
  </style>
</head>
<body>
<canvas id="c"></canvas>

<div id="ui">
  <button id="next">Next</button>
  <button id="reset">Reset</button>

  <label>Padding</label>
  <input id="pad" type="range" min="0" max="30" value="6" />
  <span id="padVal">6</span>

  <label>r min</label>
  <input id="rmin" type="range" min="2" max="80" value="12" />
  <span id="rminVal">12</span>

  <label>r max</label>
  <input id="rmax" type="range" min="10" max="260" value="120" />
  <span id="rmaxVal">120</span>

  <div id="stats">N=0</div>
</div>

<div id="hint">
  Tap <b>Next</b> to attempt to add one random circle. A circle is accepted only if, for <i>every</i> existing circle:<br/>
  <span class="mono">dist(centers) &gt; (r_new + r_i + padding)</span> (otherwise it is discarded and we retry).<br/>
  This uses a HoldStack of {x,y,r}. If the screen gets too crowded, Next may fail to add a circle.
</div>

<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d', { alpha:false });

  // One color for all circles
  const C = { fill:"rgba(70,130,255,0.22)", stroke:"rgba(70,130,255,0.85)" };

  // HoldStack: array of {x,y,r}
  let holdStack = [];

  const nextBtn = document.getElementById('next');
  const resetBtn = document.getElementById('reset');
  const padEl = document.getElementById('pad');
  const padVal = document.getElementById('padVal');
  const rminEl = document.getElementById('rmin');
  const rminVal = document.getElementById('rminVal');
  const rmaxEl = document.getElementById('rmax');
  const rmaxVal = document.getElementById('rmaxVal');
  const statsEl = document.getElementById('stats');

  function rand(min, max){ return min + Math.random()*(max-min); }

  function resize(){
    const dpr = Math.max(1, Math.min(3, window.devicePixelRatio || 1));
    canvas.width = Math.floor(window.innerWidth * dpr);
    canvas.height = Math.floor(window.innerHeight * dpr);
    canvas.style.width = window.innerWidth + "px";
    canvas.style.height = window.innerHeight + "px";
    ctx.setTransform(dpr,0,0,dpr,0,0);
    clearCanvas();
    redrawAll();
  }
  window.addEventListener('resize', resize, {passive:true});

  function clearCanvas(){
    ctx.fillStyle="#0b0f14";
    ctx.fillRect(0,0,window.innerWidth, window.innerHeight);
  }

  function drawCircle(c){
    ctx.beginPath();
    ctx.arc(c.x,c.y,c.r,0,Math.PI*2);
    ctx.closePath();
    ctx.fillStyle = C.fill;
    ctx.fill();
    ctx.lineWidth = 1.25;
    ctx.strokeStyle = C.stroke;
    ctx.stroke();
  }

  function redrawAll(){
    for (const c of holdStack) drawCircle(c);
  }

  // Non-overlap test against ALL circles in HoldStack
  function fitsAll(cNew, padding){
    for (const c of holdStack){
      const d = Math.hypot(cNew.x - c.x, cNew.y - c.y);
      if (d <= (cNew.r + c.r + padding)) return false; // overlap / too close
    }
    return true;
  }

  function init(){
    holdStack = [];
    clearCanvas();

    // Start with one random circle
    const w = window.innerWidth, h = window.innerHeight;
    const r0 = rand(Math.min(w,h)*0.08, Math.min(w,h)*0.18);
    const c0 = {
      r: r0,
      x: rand(r0, w - r0),
      y: rand(r0, h - r0)
    };
    holdStack.push(c0);
    drawCircle(c0);
    statsEl.textContent = `N=${holdStack.length}`;
  }

  function stepOnce(){
    const w = window.innerWidth, h = window.innerHeight;
    const padding = parseFloat(padEl.value) || 0;

    let rMin = parseFloat(rminEl.value) || 2;
    let rMax = parseFloat(rmaxEl.value) || 50;
    if (rMax < rMin) { const tmp=rMin; rMin=rMax; rMax=tmp; }

    // Rejection sampling: pick random center AND radius; accept only if non-overlapping with ALL existing circles
    const MAX_TRIES = 3000;
    for (let t=0; t<MAX_TRIES; t++){
      const r = rand(rMin, rMax);

      // keep on-screen
      const x = rand(r, w - r);
      const y = rand(r, h - r);

      const cNew = { x, y, r };

      if (fitsAll(cNew, padding)){
        holdStack.push(cNew);
        drawCircle(cNew);
        statsEl.textContent = `N=${holdStack.length}`;
        return true;
      }
    }
    // too crowded or radii too large: no circle added
    return false;
  }

  nextBtn.addEventListener('click', () => { stepOnce(); });
  resetBtn.addEventListener('click', () => init());

  padEl.addEventListener('input', () => padVal.textContent = `${padEl.value}`);
  rminEl.addEventListener('input', () => rminVal.textContent = `${rminEl.value}`);
  rmaxEl.addEventListener('input', () => rmaxVal.textContent = `${rmaxEl.value}`);

  document.addEventListener('touchmove', (e)=>e.preventDefault(), {passive:false});

  resize();
  padVal.textContent = `${padEl.value}`;
  rminVal.textContent = `${rminEl.value}`;
  rmaxVal.textContent = `${rmaxEl.value}`;
  init();
})();
</script>
</body>
</html>
