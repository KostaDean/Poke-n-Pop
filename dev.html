<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Endless Filled Circles (HoldStack)</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;font-family:-apple-system,system-ui,Segoe UI,Roboto,Arial,sans-serif}
  body{background:#070812}
  #ui{
    position:fixed;left:12px;top:12px;z-index:10;
    background:rgba(0,0,0,.45);backdrop-filter: blur(6px);
    border:1px solid rgba(255,255,255,.12);border-radius:12px;
    padding:10px 12px;color:#eee;display:flex;gap:10px;align-items:center;flex-wrap:wrap;
  }
  #ui button{background:#18181f;color:#eee;border:1px solid rgba(255,255,255,.18);border-radius:10px;padding:8px 10px;font-size:14px}
  #ui button:active{transform:scale(.98)}
  #ui label{display:flex;gap:6px;align-items:center;font-size:13px;opacity:.95}
  #ui input[type="range"]{width:130px}
  #stats{font-size:13px;opacity:.9;display:flex;gap:10px;align-items:center}
  .swatch{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:4px;vertical-align:-1px}
  canvas{display:block}
</style>
</head>
<body>
<div id="ui">
  <button id="toggle">Pause</button>
  <button id="clear">Clear</button>
  <label>Circles/sec <input id="speed" type="range" min="1" max="60" value="12"></label>
  <label>Opacity <input id="alpha" type="range" min="0.05" max="1" step="0.05" value="0.35"></label>
  <div id="stats">
    <span>circles: <span id="count">0</span></span>
    <span><span class="swatch" id="sw1"></span>outside</span>
    <span><span class="swatch" id="sw2"></span>inside</span>
  </div>
</div>
<canvas id="c"></canvas>

<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d', { alpha:false });

  const countEl = document.getElementById('count');
  const speedEl = document.getElementById('speed');
  const alphaEl = document.getElementById('alpha');
  const toggleBtn = document.getElementById('toggle');
  const clearBtn = document.getElementById('clear');

  // Background + 2 circle colors (default + "inside another circle" color)
  const bg = '#070812';
  const fillOutside = '#00E5FF';
  const fillInside  = '#FF2ED1';

  document.getElementById('sw1').style.background = fillOutside;
  document.getElementById('sw2').style.background = fillInside;

  let W=0, H=0, DPR=1;
  function resize() {
    DPR = Math.max(1, Math.min(3, window.devicePixelRatio || 1));
    W = Math.floor(window.innerWidth);
    H = Math.floor(window.innerHeight);

    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';

    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

    ctx.fillStyle = bg;
    ctx.fillRect(0,0,W,H);

    for (const c of holdStack) drawCircle(c);
  }
  window.addEventListener('resize', resize, { passive:true });

  // HoldStack items: {x,y,r,inside:boolean}
  const holdStack = [];

  const rand = (a,b)=> a + Math.random()*(b-a);

  function drawCircle(c) {
    const a = Number(alphaEl.value) || 0.35;
    ctx.globalAlpha = a;

    ctx.fillStyle = c.inside ? fillInside : fillOutside;
    ctx.beginPath();
    ctx.arc(c.x, c.y, c.r, 0, Math.PI*2);
    ctx.fill();

    // optional crisp edge
    ctx.globalAlpha = Math.min(1, a + 0.25);
    ctx.strokeStyle = c.inside ? fillInside : fillOutside;
    ctx.lineWidth = 1;
    ctx.stroke();

    ctx.globalAlpha = 1;
  }

  function addOneCircle() {
    const x = rand(10, W-10);
    const y = rand(10, H-10);

    if (holdStack.length === 0) {
      const r0 = Math.max(12, Math.min(W,H)*0.10);
      const c0 = {x,y,r:r0,inside:false};
      holdStack.push(c0);
      drawCircle(c0);
      countEl.textContent = String(holdStack.length);
      return;
    }

    // Find nearest center (minimum Dm) and its radius Rm
    let best = holdStack[0];
    let bestD = Infinity;

    for (const c of holdStack) {
      const d = Math.hypot(x - c.x, y - c.y);
      if (d < bestD) { bestD = d; best = c; }
    }

    const Dm = bestD;
    const Rm = best.r;
    const diff = Dm - Rm;

    // radius = abs(Dm - Rm) - 3
    let rNew = Math.abs(diff) - 3;

    // skip degenerate
    if (!Number.isFinite(rNew) || rNew < 1) return;

    // cap huge
    const rMax = Math.min(W,H) * 0.48;
    if (rNew > rMax) rNew = rMax;

    const inside = (diff < 0); // if center is inside that nearest circle => switch color
    const cNew = {x,y,r:rNew,inside};
    holdStack.push(cNew);
    drawCircle(cNew);
    countEl.textContent = String(holdStack.length);
  }

  let running = true;
  toggleBtn.addEventListener('click', () => {
    running = !running;
    toggleBtn.textContent = running ? 'Pause' : 'Resume';
  });

  clearBtn.addEventListener('click', () => {
    holdStack.length = 0;
    ctx.fillStyle = bg;
    ctx.fillRect(0,0,W,H);
    countEl.textContent = '0';
  });

  // Time-based speed control (circles per second)
  let lastT = performance.now();
  let acc = 0;

  function frame(t) {
    const dt = Math.min(0.05, (t - lastT) / 1000);
    lastT = t;

    if (running) {
      const cps = Number(speedEl.value) || 12;
      acc += dt * cps;
      const n = Math.floor(acc);
      if (n > 0) {
        acc -= n;
        for (let i=0; i<n; i++) addOneCircle();
      }
    }

    requestAnimationFrame(frame);
  }

  resize();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
