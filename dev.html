<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Random Non-Overlapping Circles</title>
<style>
  html,body{margin:0;height:100%;background:#111;display:grid;place-items:center;overflow:hidden;}
  #field{width:min(94vw,980px);height:min(78vh,720px);background:red;box-shadow:0 10px 35px rgba(0,0,0,.5);border-radius:8px;overflow:hidden;}
  canvas{width:100%;height:100%;display:block;}
  #hint{position:fixed;bottom:10px;font:12px/1.2 system-ui,-apple-system,Segoe UI,Roboto,Arial;color:rgba(255,255,255,.7);text-align:center;padding:0 12px;}
</style>
</head>
<body>
  <div id="field"><canvas id="c"></canvas></div>
  <div id="hint">Tap to pause/resume • Double-tap to reset</div>

<script>
(() => {
  const field = document.getElementById('field');
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d', { alpha:false });

  // ---- tweakables ----
  const baseColor = '#ff0000';
  const circleColor = '#0055ff';
  const R = 22;      // circle radius
  const B = 6;       // buffer between circles
  const perTick = 2;
  const tickMs = 28;
  const maxAttemptsPerCircle = 300;
  // --------------------

  let W=0,H=0,dpr=1;
  let circles = [];
  let running = true;

  function resize() {
    const r = field.getBoundingClientRect();
    dpr = Math.max(1, window.devicePixelRatio || 1);
    canvas.width = Math.floor(r.width * dpr);
    canvas.height = Math.floor(r.height * dpr);
    ctx.setTransform(dpr,0,0,dpr,0,0);
    W = r.width; H = r.height;
    reset();
  }

  function reset() {
    circles = [];
    ctx.fillStyle = baseColor;
    ctx.fillRect(0,0,W,H);
  }

  function overlaps(x,y) {
    for (const c of circles) {
      const dx = x - c.x;
      const dy = y - c.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < (R + R + B)) return true;
    }
    return false;
  }

  function placeOne() {
    const minX = R;
    const minY = R;
    const maxX = W - R;
    const maxY = H - R;
    if (maxX <= minX || maxY <= minY) return false;

    for (let a=0; a<maxAttemptsPerCircle; a++) {
      const x = minX + Math.random() * (maxX - minX);
      const y = minY + Math.random() * (maxY - minY);

      if (!overlaps(x,y)) {
        circles.push({x,y});
        ctx.beginPath();
        ctx.arc(x,y,R,0,Math.PI*2);
        ctx.fillStyle = circleColor;
        ctx.fill();
        return true;
      }
    }
    return false;
  }

  function tick() {
    if (!running) return;

    for (let i=0;i<perTick;i++) {
      const ok = placeOne();
      if (!ok) {
        running = false;
        setTimeout(() => { reset(); running = true; }, 650);
        break;
      }
    }
  }

  let lastTap = 0;
  field.addEventListener('pointerdown', () => {
    const now = Date.now();
    if (now - lastTap < 350) reset();
    else running = !running;
    lastTap = now;
  });

  window.addEventListener('resize', resize);
  resize();
  setInterval(tick, tickMs);
})();
</script>
</body>
</html>
