<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Grid Random Squares Screensaver</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #111;
      overflow: hidden;
      display: grid;
      place-items: center;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }
    /* Rectangle that covers most of the screen */
    #field {
      width: min(94vw, 980px);
      height: min(78vh, 720px);
      background: red;
      box-shadow: 0 10px 35px rgba(0,0,0,.5);
      position: relative;
      border-radius: 8px;
      overflow: hidden;
    }
    canvas { width: 100%; height: 100%; display: block; }
    #hint {
      position: fixed;
      bottom: 10px;
      font-size: 12px;
      line-height: 1.2;
      color: rgba(255,255,255,.7);
      text-align: center;
      padding: 0 12px;
    }
  </style>
</head>
<body>
  <div id="field"><canvas id="c"></canvas></div>
  <div id="hint">Tap to pause/resume • Double‑tap to reset</div>

<script>
(() => {
  const field = document.getElementById('field');
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d', { alpha: false });

  // ---- tweakables ----
  const baseColor = '#ff0000';   // red background
  const fillColor = '#0055ff';   // blue squares
  let cellSize = 26;             // square size in CSS pixels (auto-adjusts to fit cleanly)
  let squaresPerTick = 4;        // how many squares to flip per tick
  let tickMs = 35;               // speed (lower = faster)
  // --------------------

  let cols = 0, rows = 0;
  let remaining = [];            // available cell indices
  let running = true;

  function resize() {
    const rect = field.getBoundingClientRect();
    const dpr = Math.max(1, window.devicePixelRatio || 1);

    canvas.width = Math.floor(rect.width * dpr);
    canvas.height = Math.floor(rect.height * dpr);

    // Draw in CSS pixels, regardless of DPR
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    // Choose a cell size near requested that yields a clean integer grid
    const w = rect.width, h = rect.height;
    const target = cellSize;

    let best = target, bestScore = Infinity;
    for (let s = Math.max(10, target - 10); s <= target + 10; s++) {
      const c = Math.floor(w / s);
      const r = Math.floor(h / s);
      if (c < 6 || r < 6) continue;

      const leftover = (w - c * s) + (h - r * s); // unused margin
      const score = leftover * 10 + Math.abs(s - target);

      if (score < bestScore) { bestScore = score; best = s; }
    }
    cellSize = best;

    cols = Math.floor(w / cellSize);
    rows = Math.floor(h / cellSize);

    reset();
  }

  function reset() {
    // Paint base
    ctx.fillStyle = baseColor;
    ctx.fillRect(0, 0, cols * cellSize, rows * cellSize);

    // Build list of all grid cells
    const total = cols * rows;
    remaining = Array.from({ length: total }, (_, i) => i);
  }

  function step() {
    if (!running) return;

    if (remaining.length === 0) {
      // Filled: pause briefly, then restart
      running = false;
      setTimeout(() => { reset(); running = true; }, 650);
      return;
    }

    ctx.fillStyle = fillColor;

    const n = Math.min(squaresPerTick, remaining.length);
    for (let k = 0; k < n; k++) {
      // Pick random remaining cell (swap-pop removal = O(1))
      const j = (Math.random() * remaining.length) | 0;
      const idx = remaining[j];
      remaining[j] = remaining[remaining.length - 1];
      remaining.pop();

      const x = (idx % cols) * cellSize;
      const y = ((idx / cols) | 0) * cellSize;

      ctx.fillRect(x, y, cellSize, cellSize);
    }
  }

  let timer = null;
  function startLoop() {
    if (timer) clearInterval(timer);
    timer = setInterval(step, tickMs);
  }

  // Tap to pause/resume; double-tap to reset
  let lastTap = 0;
  field.addEventListener('pointerdown', () => {
    const now = Date.now();
    if (now - lastTap < 350) reset();
    else running = !running;
    lastTap = now;
  });

  window.addEventListener('resize', () => { resize(); startLoop(); });

  resize();
  startLoop();
})();
</script>
</body>
</html>
